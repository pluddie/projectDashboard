<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>小女孩和花花獅拍貼機</title>

<!-- iOS「加到主畫面」全螢幕設定 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="拍貼機">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#241712">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#241712;
    --surface:#33231C;
    --ink:#FBEEE3;
    --muted:#A98770;
    --accent:#FF9248;
    --accent-soft:#4A2E1C;
    --accent2:#FFB066;
    --accent2-soft:#3D2A1C;
    --line:#4A372C;
    --surface-translucent:rgba(51,35,28,0.85); /* 深色版replace-btn等半透明背景用 */
    --font:'Nunito','Zen Maru Gothic',sans-serif;
    --edge-pad:36px; /* 全站統一的上下安全間距，header 頂部與 footer 底部都用這個值 */
    --photo-ratio:100/148; /* 相紙比例：4×6明信片 100×148mm，直式 */
  }

  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{
    width:100%; height:100%;
    background:var(--bg);
    overflow:hidden;
    font-family:var(--font);
    color:var(--ink);
    -webkit-user-select:none; user-select:none;
  }

  #app{
    position:fixed; inset:0;
    height:100vh; height:100dvh;
    background:var(--bg);
    display:flex;
    justify-content:center;
  }

  /* 響應式外框：全螢幕填滿，不限制寬度 */
  #app-shell{
    width:100%;
    height:100%;
    position:relative;
    overflow:hidden;
    display:flex; flex-direction:column;
  }

  /* ── Copyright footer ── */
  #copyright-footer{
    flex-shrink:0;
    text-align:center;
    padding:6px 0 max(8px, env(safe-area-inset-bottom));
    font-family:var(--font);
    font-size:11px;
    font-weight:700;
    letter-spacing:.14em;
    color:var(--muted);
    background:var(--bg);
    z-index:100;
  }

  #screens{ flex:1; position:relative; overflow:hidden; }

  .screen{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    opacity:0; visibility:hidden;
    transition:opacity .4s ease;
    pointer-events:none;
    background:var(--bg);
  }
  .screen.active{ opacity:1; visibility:visible; pointer-events:auto; }

  /* ── 共用按鈕 ── */
  .btn{
    font-family:var(--font);
    font-weight:800;
    font-size:20px;
    border-radius:50px;
    padding:18px 0;
    flex:1;
    border:none;
    transition:transform .15s, opacity .2s;
    cursor:pointer;
  }
  .btn:active{ transform:scale(.97); }
  .btn-outline{
    background:var(--surface);
    color:var(--ink);
    border:2.5px solid var(--ink);
  }
  .btn-fill{
    background:var(--accent);
    color:#fff;
  }
  .btn-fill:disabled{ opacity:.35; }

  /* 桌面版：各頁面內容置中，背景仍全螢幕填滿 */
  .page-header,
  .frames-body,
  .layout-options,
  .cam-content,
  .printing-inner,
  .page-footer{
    max-width:720px;
    margin-left:auto;
    margin-right:auto;
    width:100%;
    box-sizing:border-box;
  }
  .ratio-box{
    aspect-ratio:var(--photo-ratio);
    border-radius:20px;
    overflow:hidden;
    position:relative;
    background:var(--surface);
  }

  /* ===================== 1. 歡迎頁 ===================== */
  #screen-welcome{
    align-items:center; justify-content:space-between;
    text-align:center;
    padding:52px 28px 44px;
    background:
      radial-gradient(circle at 18% 12%, var(--accent-soft) 0%, transparent 45%),
      radial-gradient(circle at 85% 78%, var(--accent2-soft) 0%, transparent 45%),
      var(--bg);
    cursor:pointer;
  }
  .welcome-deco-top{ display:flex; gap:14px; }
  .welcome-deco-top svg{ width:36px; height:36px; }
  .welcome-mid{ display:flex; flex-direction:column; align-items:center; gap:28px; }
  .mascot-emoji{
    font-size:120px; line-height:1;
    display:flex; align-items:center;
    filter:drop-shadow(0 8px 16px #00000014);
  }
  .mascot-emoji .emoji-gap{ margin-left:8px; }
  .brand-title{
    font-family:var(--font);
    font-weight:900;
    font-size:52px;
    line-height:1.4;
    color:var(--ink);
    letter-spacing:.04em;
  }
  .brand-sub{
    font-family:var(--font);
    font-weight:800;
    font-size:32px;
    letter-spacing:.24em;
    color:var(--accent);
    margin-top:14px;
  }
  .press-start{
    font-family:var(--font);
    font-weight:900;
    font-size:22px;
    letter-spacing:.2em;
    color:#fff;
    background:var(--accent);
    border:none;
    border-radius:50px;
    padding:22px 52px;
    animation:pulseScale 1.8s ease-in-out infinite;
    box-shadow:0 8px 24px -6px #FF924855;
    cursor:pointer;
  }
  @keyframes pulseScale{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.045); }
  }

  /* ===================== 2. 選擇相框 ===================== */
  #screen-frames{
    display:flex; flex-direction:column;
    padding:0;
  }

  /* 固定標題區：外層只負責頂部安全間距，內層才是實際標題列（高度固定、無額外padding，
     確保「絕對定位置中」的返回鈕跟「flex置中」的標題用同一個基準點，才會真正對齊） */
  .page-header{
    flex-shrink:0;
    padding-top:max(var(--edge-pad), env(safe-area-inset-top));
    background:var(--bg);
  }
  .page-header-row{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    height:64px;
    padding:0 16px;
  }
  .btn-back{
    position:absolute; left:12px; top:50%; transform:translateY(-50%);
    display:flex; align-items:center; gap:4px;
    font-family:var(--font);
    font-weight:800;
    font-size:18px;
    color:var(--ink);
    background:none;
    border:none;
    cursor:pointer;
    padding:8px 12px 8px 6px;
    border-radius:50px;
    transition:background .15s;
    white-space:nowrap;
    z-index:2;
  }
  .btn-back:active{ background:var(--line); }
  .btn-back svg{ width:22px; height:22px; flex-shrink:0; }
  .page-title{
    font-family:var(--font);
    font-weight:900;
    font-size:30px;
    color:var(--ink);
    letter-spacing:.04em;
    text-align:center;
    pointer-events:none;
  }

  .frames-body{
    flex:1;
    display:flex;
    min-height:0;
    overflow:hidden;
  }
  .frames-scroll{
    flex:1;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:14px 16px 16px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    align-content:start;
    scrollbar-width:none;
  }
  .frames-scroll::-webkit-scrollbar{ display:none; }
  .scroll-hint{
    flex-shrink:0;
    width:40px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    padding:16px 0;
    color:var(--muted);
  }
  .scroll-hint-arrow{ width:22px; height:14px; flex-shrink:0; }
  .scroll-hint-text{
    writing-mode:vertical-rl;
    text-orientation:mixed;
    font-family:var(--font);
    font-weight:700;
    font-size:17px;
    letter-spacing:.15em;
    white-space:nowrap;
  }
  .frame-slot{
    width:100%;
    aspect-ratio:var(--photo-ratio);
    position:relative;
    border-radius:16px;
    border:2px dashed var(--line);
    background:var(--surface);
    box-shadow:0 4px 14px -6px #00000040;
    transition:border-color .25s, background .25s, transform .15s;
    overflow:hidden;
  }
  .frame-slot:active{ transform:scale(.97); }
  .frame-slot.selected{ border:2.5px solid var(--accent); background:var(--accent-soft); }
  .frame-slot.has-image{ border-style:solid; border-color:var(--line); }
  .frame-slot.has-image.selected{ border-color:var(--accent); }
  .frame-slot > *:not(input){ position:absolute; inset:0; }
  .frame-slot img{ width:100%; height:100%; object-fit:cover; display:block; }
  .slot-inner{ display:flex; align-items:center; justify-content:center; }
  .plus-icon{ width:30px; height:30px; color:var(--muted); }
  .sel-badge{
    position:absolute; bottom:8px; right:8px; top:auto; left:auto;
    width:28px; height:28px; border-radius:50%;
    background:var(--accent);
    display:flex; align-items:center; justify-content:center;
    opacity:0; transform:scale(.6);
    transition:opacity .2s, transform .2s;
    z-index:2;
  }
  .frame-slot.selected .sel-badge{ opacity:1; transform:scale(1); }
  .sel-badge svg{ width:14px; height:14px; }
  .replace-btn{
    position:absolute; top:8px; left:8px;
    width:28px; height:28px; border-radius:50%;
    background:var(--surface-translucent);
    backdrop-filter:blur(2px);
    -webkit-backdrop-filter:blur(2px);
    border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    z-index:2;
  }
  .replace-btn svg{ width:14px; height:14px; color:var(--ink); }

  /* 固定底部按鈕 */
  .page-footer{
    flex-shrink:0;
    display:flex; gap:14px;
    padding:14px 20px max(var(--edge-pad), env(safe-area-inset-bottom));
    background:var(--bg);
  }

  /* ===================== 2b. 選擇排版 ===================== */
  #screen-layout{
    display:flex; flex-direction:column;
  }
  .layout-options{
    flex:1;
    display:flex; flex-direction:column;
    justify-content:center;
    gap:16px;
    padding:20px 24px;
    overflow-y:auto;
    min-height:0;
  }
  .layout-option{
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
    width:100%;
    flex:1;
    padding:20px 16px;
    border-radius:24px;
    border:2px solid var(--line);
    background:var(--surface);
    cursor:pointer;
    text-align:center;
    font-family:var(--font);
    transition:border-color .2s, background .2s, transform .15s;
    min-height:0;
  }
  .layout-option:active{ transform:scale(.98); }
  .layout-option.selected{ border:2.5px solid var(--accent); background:var(--accent-soft); }
  .layout-preview{
    flex-shrink:0;
    width:56px;
    aspect-ratio:var(--photo-ratio);
    display:grid; gap:3px;
    padding:4px;
    border-radius:10px;
    background:var(--line);
  }
  .layout-preview span{ background:var(--surface); border-radius:2px; }
  .layout-preview-2x2{ grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; }
  .layout-preview-2x3{ grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr 1fr; }
  .layout-option-text{ display:flex; flex-direction:column; gap:5px; }
  .layout-option-title{
    font-weight:900; font-size:22px; color:var(--ink);
  }
  .layout-option-desc{
    font-weight:700; font-size:13px; color:var(--muted); line-height:1.5;
  }

  /* ===================== 3. 拍照畫面 ===================== */
  #screen-camera{
    display:flex; flex-direction:column;
  }

  /* 拍照頁：中間可伸展區域 */
  .cam-content{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:12px 20px;
    gap:16px;
    min-height:0;
  }

  /* 相機預覽框：依照模式顯示對應尺寸的鏡頭 */
  .cam-box{
    --cam-ratio:552/470; /* 預設2x3模式；2x2模式由JS動態切換 */
    aspect-ratio:var(--cam-ratio) !important;
    width:min(calc((100dvh - 280px) * 552/470), calc(100vw - 48px));
    box-shadow:0 18px 40px -10px #00000055;
  }
  .cam-box.mode-2x2{
    --cam-ratio:552/552;
    width:min(calc(100dvh - 280px), calc(100vw - 48px));
  }
  .print-box{
    width:min(calc((100dvh - 330px) * 100/148), calc(100vw - 64px));
  }
  .shot-progress{ display:flex; gap:10px; }
  .shot-dot{
    width:12px; height:12px; border-radius:50%;
    background:var(--line);
    transition:background .25s, transform .25s;
  }
  .shot-dot.done{ background:var(--accent); }
  .shot-dot.current{ background:var(--accent); transform:scale(1.3); }
  .cam-box video, .cam-box canvas{
    position:absolute; inset:0;
    width:100%; height:100%; object-fit:cover;
  }
  #video{ transform:scaleX(-1); }
  .frame-overlay-img{
    position:absolute; inset:0;
    width:100%; height:100%; object-fit:cover;
    pointer-events:none;
  }
  #capturedCanvas{ display:none; }
  #capturedCanvas.show{ display:block; }
  #video.hide{ display:none; }
  .flash-overlay{
    position:absolute; inset:0; background:#fff;
    opacity:0; pointer-events:none; border-radius:18px; z-index:3;
  }
  .flash-overlay.fire{ animation:flashFire .3s ease-out; }
  @keyframes flashFire{ 0%{opacity:1} 100%{opacity:0} }
  .countdown-num{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font);
    font-weight:900; font-size:120px;
    color:#fff;
    text-shadow:0 4px 20px #00000055;
    background:#00000022;
    z-index:4; opacity:0; pointer-events:none;
  }
  .countdown-num.show{ animation:countPulse .9s ease-out; }
  @keyframes countPulse{
    0%{ opacity:0; transform:scale(1.5); }
    20%{ opacity:1; transform:scale(1); }
    85%{ opacity:1; transform:scale(1); }
    100%{ opacity:0; transform:scale(.92); }
  }

  /* ===================== 4. 列印中 / 完成 ===================== */
  #screen-printing{
    display:flex; flex-direction:column;
  }

  .printing-inner{
    flex:1;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:16px 28px max(var(--edge-pad), env(safe-area-inset-bottom));
    gap:16px;
    min-height:0;
    overflow:hidden;
  }

  .print-box{
    box-shadow:0 24px 50px -12px #00000060;
    animation:printPop .6s ease-out;
    flex-shrink:0;
  }
  @keyframes printPop{
    0%{ opacity:0; transform:translateY(18px) scale(.96); }
    100%{ opacity:1; transform:translateY(0) scale(1); }
  }
  .print-box canvas{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }

  .printing-text{
    font-family:var(--font);
    font-weight:800;
    font-size:22px;
    color:var(--ink);
    display:flex; flex-direction:column; align-items:center; gap:12px;
  }
  .dot-flicker{ display:flex; gap:7px; }
  .dot-flicker span{
    display:inline-block; width:10px; height:10px; border-radius:50%;
    background:var(--accent);
    animation:dotBlink 1.2s infinite;
  }
  .dot-flicker span:nth-child(2){ animation-delay:.2s; }
  .dot-flicker span:nth-child(3){ animation-delay:.4s; }
  @keyframes dotBlink{ 0%,80%,100%{opacity:.15} 40%{opacity:1} }
  .progress-track{
    width:200px; height:7px; background:var(--line);
    border-radius:6px; overflow:hidden;
  }
  .progress-fill{
    height:100%; background:var(--accent); width:0%;
    border-radius:6px; transition:width .4s linear;
  }

  #printingStageInfo{
    display:flex; flex-direction:column; align-items:center; gap:12px;
  }

  /* ── 完成 Popup ── */
  .popup-backdrop{
    position:absolute; inset:0; z-index:200;
    background:rgba(36,23,18,0.35); /* 不用純黑，改用主題深色低透明度，主要靠模糊製造區隔 */
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    display:flex; align-items:center; justify-content:center;
    padding:24px;
    opacity:0; visibility:hidden;
    transition:opacity .35s ease, visibility .35s;
  }
  .popup-backdrop.open{
    opacity:1; visibility:visible;
  }
  .popup-card{
    background:var(--surface);
    border-radius:28px;
    padding:32px 28px 28px;
    width:100%; max-width:360px;
    display:flex; flex-direction:column; align-items:center; gap:18px;
    box-shadow:0 30px 60px -12px #00000070;
    transform:scale(.88) translateY(24px);
    transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  }
  .popup-backdrop.open .popup-card{
    transform:scale(1) translateY(0);
  }
  .popup-icon{ font-size:52px; line-height:1; }
  .popup-title{
    font-family:var(--font);
    font-weight:900;
    font-size:28px;
    color:var(--ink);
    text-align:center;
    line-height:1.4;
  }
  .popup-qr-wrap{
    /* 強制保持白底，QR code 不能跟著深色主題反轉，否則會影響掃描成功率 */
    background:#ffffff;
    border-radius:20px;
    padding:14px;
    border:2px solid var(--line);
  }
  .popup-qr-wrap img{
    display:block;
    width:200px; height:200px;
    border-radius:10px;
  }
  .popup-qr-label{
    font-family:var(--font);
    font-weight:700;
    font-size:15px;
    color:var(--muted);
    text-align:center;
  }
  .popup-btn{
    width:100%;
    font-family:var(--font);
    font-weight:800;
    font-size:20px;
    border-radius:50px;
    padding:18px 0;
    border:none;
    background:var(--accent);
    color:#fff;
    cursor:pointer;
    transition:transform .15s;
  }
  .popup-btn:active{ transform:scale(.97); }

</style>
</head>
<body>

<div id="app">
  <div id="app-shell">
    <div id="screens">

    <!-- ===================== 1. 歡迎光臨 ===================== -->
    <div class="screen active" id="screen-welcome">
      <div class="welcome-deco-top">
        <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="6" fill="var(--accent2)"/><g fill="var(--accent)"><ellipse cx="20" cy="7" rx="5" ry="8"/><ellipse cx="20" cy="33" rx="5" ry="8"/><ellipse cx="7" cy="20" rx="8" ry="5"/><ellipse cx="33" cy="20" rx="8" ry="5"/></g></svg>
        <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="6" fill="var(--accent)"/><g fill="var(--accent2)"><ellipse cx="20" cy="7" rx="5" ry="8"/><ellipse cx="20" cy="33" rx="5" ry="8"/><ellipse cx="7" cy="20" rx="8" ry="5"/><ellipse cx="33" cy="20" rx="8" ry="5"/></g></svg>
        <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="6" fill="var(--accent2)"/><g fill="var(--accent)"><ellipse cx="20" cy="7" rx="5" ry="8"/><ellipse cx="20" cy="33" rx="5" ry="8"/><ellipse cx="7" cy="20" rx="8" ry="5"/><ellipse cx="33" cy="20" rx="8" ry="5"/></g></svg>
      </div>
      <div class="welcome-mid">
        <div class="mascot-emoji">👧<span class="emoji-gap">🦁</span></div>
        <div>
          <div class="brand-title">小女孩和花花獅<br>拍貼機</div>
          <div class="brand-sub">PHOTO BOOTH</div>
        </div>
      </div>
      <div class="press-start">PRESS TO START</div>
    </div>

    <!-- ===================== 2. 選擇照片樣式 ===================== -->
    <div class="screen" id="screen-layout">
      <div class="page-header">
        <div class="page-header-row">
          <button class="btn-back" id="btnLayoutBack">
            <svg viewBox="0 0 24 24" fill="none"><path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            返回
          </button>
          <span class="page-title">選擇照片樣式</span>
        </div>
      </div>
      <div class="layout-options">
        <button class="layout-option" data-layout="2x3">
          <div class="layout-preview layout-preview-2x3"><span></span><span></span><span></span><span></span><span></span><span></span></div>
          <div class="layout-option-text">
            <div class="layout-option-title">2×3 拼貼</div>
            <div class="layout-option-desc">拍 3 張，左右各三張，直式明信片</div>
          </div>
        </button>
        <button class="layout-option" data-layout="2x2">
          <div class="layout-preview layout-preview-2x2"><span></span><span></span><span></span><span></span></div>
          <div class="layout-option-text">
            <div class="layout-option-title">2×2 拼貼</div>
            <div class="layout-option-desc">拍 4 張，左二右二，直式明信片</div>
          </div>
        </button>
      </div>
      <div class="page-footer">
        <button class="btn btn-fill" id="btnLayoutConfirm" disabled>確認選擇</button>
      </div>
    </div>

    <!-- ===================== 3. 選擇相框 ===================== -->
    <div class="screen" id="screen-frames">
      <div class="page-header">
        <div class="page-header-row">
          <button class="btn-back" id="btnFrameBack">
            <svg viewBox="0 0 24 24" fill="none"><path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            返回
          </button>
          <span class="page-title">選擇相框</span>
        </div>
      </div>
      <div class="frames-body">
        <div class="frames-scroll" id="framesScroll"></div>
        <div class="scroll-hint" aria-hidden="true">
          <svg class="scroll-hint-arrow" viewBox="0 0 16 10" fill="none"><path d="M1 9L8 1L15 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="scroll-hint-text">滑動選取更多樣式</span>
          <svg class="scroll-hint-arrow" viewBox="0 0 16 10" fill="none"><path d="M1 1L8 9L15 1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div class="page-footer">
        <button class="btn btn-fill" id="btnFrameConfirm" disabled>確認選擇</button>
      </div>
    </div>

    <!-- ===================== 3. 拍照畫面 ===================== -->
    <div class="screen" id="screen-camera">
      <div class="page-header">
        <div class="page-header-row">
          <button class="btn-back" id="btnCameraBack">
            <svg viewBox="0 0 24 24" fill="none"><path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            返回
          </button>
          <span class="page-title">來個大大的微笑！</span>
        </div>
      </div>
      <div class="cam-content">
        <div class="shot-progress" id="shotProgress">
          <span class="shot-dot"></span><span class="shot-dot"></span><span class="shot-dot"></span><span class="shot-dot"></span>
        </div>
        <div class="ratio-box cam-box">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="capturedCanvas"></canvas>
          <img class="frame-overlay-img" id="cameraFrameOverlay" src="" style="display:none">
          <div class="countdown-num" id="countdownNum"></div>
          <div class="flash-overlay" id="flashOverlay"></div>
        </div>
      </div>
      <div class="page-footer">
        <button class="btn btn-fill" id="btnConfirmShot">開始拍照</button>
      </div>
    </div>

    <!-- ===================== 4. 列印中 / 完成 ===================== -->
    <div class="screen" id="screen-printing">
      <div class="page-header">
        <div class="page-header-row">
          <button class="btn-back" id="btnPrintBack">
            <svg viewBox="0 0 24 24" fill="none"><path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            返回
          </button>
          <span class="page-title" id="printNavTitle">照片列印中</span>
        </div>
      </div>

      <div class="printing-inner">
        <div class="ratio-box print-box">
          <canvas id="resultCanvas"></canvas>
        </div>

        <div id="printingStageInfo">
          <div class="printing-text">
            <div>照片列印中　請稍候</div>
            <div class="dot-flicker"><span></span><span></span><span></span></div>
          </div>
          <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        </div>

      </div>
      <!-- 底部按鈕（列印中隱藏，完成時不用，由 popup 控制） -->
    </div>

  </div><!-- /#screens -->

  <!-- ===================== 完成 Popup ===================== -->
  <div class="popup-backdrop" id="donePopup">
    <div class="popup-card">
      <div class="popup-icon">🎉</div>
      <div class="popup-title">照片準備好啦！</div>
      <div class="popup-qr-wrap" id="popupQrWrap">
        <img id="popupQrImg" alt="QR Code" src="">
      </div>
      <div class="popup-qr-label" id="popupQrLabel">正在產生 QR Code…</div>
      <button class="popup-btn" id="btnNextShot">再玩一次</button>
    </div>
  </div>

  <div id="copyright-footer">© PLUDDIE STUDIO</div>
  </div><!-- /#app-shell -->
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
/* =========================================================
   設定區
========================================================= */
const FRAME_DATA = [
  { id:1, src:null },{ id:2, src:null },{ id:3, src:null },{ id:4, src:null },
  { id:5, src:null },{ id:6, src:null },{ id:7, src:null },{ id:8, src:null },
];

const EMAILJS_CONFIG = {
  enabled: false,
  publicKey: 'tOXPtKhdfr5mQNlps',
  serviceId: 'service_t7d5jeu',
  templateId: 'template_ivd4njg',
  toEmail: 'pluddiedoodle@gmail.com'
};

const IMGBB_CONFIG = {
  enabled: true,
  apiKey: '51ef997908f65842badc1eddf498bbe8',
};

const OUT_W = 1181, OUT_H = 1748; // 100×148mm 明信片尺寸（4×6），300dpi
const GRID_GAP = 16; // 拼貼格子之間的間距(px，以輸出畫布尺寸為基準)
function getShotsRequired(){ return state.layout === '2x3' ? 3 : 4; }

/* ========================================================= */

let state = {
  selectedFrame: null,
  layout: null,        // '2x2' 或 '2x4'
  stream: null,
  shots: [],            // 已確認的拍攝結果(dataURL陣列)
  capturedDataUrl: null,
  shotState: 'live',
  counting: false,
};

const screens = {
  welcome:  document.getElementById('screen-welcome'),
  frames:   document.getElementById('screen-frames'),
  layout:   document.getElementById('screen-layout'),
  camera:   document.getElementById('screen-camera'),
  printing: document.getElementById('screen-printing'),
};

function goTo(name){
  Object.values(screens).forEach(s=>s.classList.remove('active'));
  screens[name].classList.add('active');
}

function resetToWelcome(){
  state.selectedFrame = null;
  state.layout = null;
  document.getElementById('btnFrameConfirm').disabled = true;
  document.getElementById('btnLayoutConfirm').disabled = true;
  document.querySelectorAll('.layout-option').forEach(el=>el.classList.remove('selected'));
  goTo('welcome');
}

/* ---------- 1. 歡迎頁 ---------- */
async function requestCameraPermission(){
  if(state.stream && state.stream.active) return state.stream;
  try{
    state.stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'user', width:{ideal:1080}, height:{ideal:1440} }, audio:false
    });
  }catch(err){
    console.error('相機權限請求失敗', err);
    state.stream = null;
  }
  return state.stream;
}

screens.welcome.addEventListener('click', async ()=>{
  await requestCameraPermission();
  goTo('layout');
});

/* ---------- 2. 相框選擇 ---------- */
function renderFrameList(){
  const wrap = document.getElementById('framesScroll');
  wrap.innerHTML = '';
  FRAME_DATA.forEach(frame=>{
    const slot = document.createElement('div');
    slot.className = 'frame-slot' + (frame.src ? ' has-image' : '');
    slot.dataset.id = frame.id;

    const fileInput = document.createElement('input');
    fileInput.type = 'file'; fileInput.accept = 'image/*'; fileInput.style.display = 'none';
    fileInput.addEventListener('change', (e)=>{
      const file = e.target.files[0]; if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev)=>{
        frame.src = ev.target.result;
        document.querySelectorAll('.frame-slot').forEach(c=>c.classList.remove('selected'));
        state.selectedFrame = frame;
        document.getElementById('btnFrameConfirm').disabled = false;
        renderFrameList();
        const refreshed = wrap.querySelector(`.frame-slot[data-id="${frame.id}"]`);
        if(refreshed) refreshed.classList.add('selected');
      };
      reader.readAsDataURL(file);
    });
    slot.appendChild(fileInput);

    const inner = document.createElement('div');
    inner.className = 'slot-inner';
    if(frame.src){
      const img = document.createElement('img'); img.src = frame.src; img.alt = '';
      inner.appendChild(img);
    } else {
      inner.innerHTML = `<svg class="plus-icon" viewBox="0 0 24 24" fill="none"><path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>`;
    }
    slot.appendChild(inner);

    if(frame.src){
      const rb = document.createElement('div');
      rb.className = 'replace-btn';
      rb.innerHTML = `<svg viewBox="0 0 24 24" fill="none"><path d="M4 16.5V19a1 1 0 001 1h2.5L18 9.5 14.5 6 4 16.5zM16 4l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
      rb.addEventListener('click', (e)=>{ e.stopPropagation(); fileInput.click(); });
      slot.appendChild(rb);
    }

    slot.insertAdjacentHTML('beforeend', `
      <div class="sel-badge">
        <svg viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>`);

    slot.addEventListener('click', ()=>{
      if(!frame.src){ fileInput.click(); return; }
      document.querySelectorAll('.frame-slot').forEach(c=>c.classList.remove('selected'));
      slot.classList.add('selected');
      state.selectedFrame = frame;
      document.getElementById('btnFrameConfirm').disabled = false;
    });

    if(state.selectedFrame && state.selectedFrame.id === frame.id) slot.classList.add('selected');
    wrap.appendChild(slot);
  });
  enforceFrameSlotHeights();
}

// 直接用實際量到的寬度算出高度並鎖死，不依賴 CSS aspect-ratio 是否被瀏覽器/預覽工具支援
function enforceFrameSlotHeights(){
  document.querySelectorAll('#framesScroll .frame-slot').forEach(slot=>{
    const w = slot.getBoundingClientRect().width;
    if(w > 0) slot.style.height = (w * 85 / 54) + 'px';
  });
}
window.addEventListener('resize', ()=>{
  if(screens.frames.classList.contains('active')) enforceFrameSlotHeights();
});

document.getElementById('btnFrameBack').addEventListener('click', ()=>{ goTo('layout'); });

document.getElementById('btnFrameConfirm').addEventListener('click', startCamera);

/* ---------- 2b. 選擇排版 ---------- */
document.querySelectorAll('.layout-option').forEach(opt=>{
  opt.addEventListener('click', ()=>{
    document.querySelectorAll('.layout-option').forEach(o=>o.classList.remove('selected'));
    opt.classList.add('selected');
    state.layout = opt.dataset.layout;
    document.getElementById('btnLayoutConfirm').disabled = false;
  });
});

document.getElementById('btnLayoutBack').addEventListener('click', ()=>{
  goTo('welcome');
});

document.getElementById('btnLayoutConfirm').addEventListener('click', ()=>{
  renderFrameList();
  goTo('frames');
});

/* ---------- 3. 拍照畫面 ---------- */
async function startCamera(){
  const overlay = document.getElementById('cameraFrameOverlay');
  overlay.style.display = 'none'; // 拍照時隱藏相框覆蓋層，拍完才顯示

  // 依照版型設定鏡頭框比例
  const camBox = document.querySelector('.cam-box');
  if(state.layout === '2x2'){
    camBox.classList.add('mode-2x2');
  } else {
    camBox.classList.remove('mode-2x2');
  }

  // 依照版型產生進度點
  const SHOTS = getShotsRequired();
  const progressEl = document.getElementById('shotProgress');
  progressEl.innerHTML = Array.from({length:SHOTS}, ()=>'<span class="shot-dot"></span>').join('');

  state.shots = [];
  updateShotProgress();
  resetCameraState();
  goTo('camera');
  const stream = await requestCameraPermission();
  if(stream){
    document.getElementById('video').srcObject = stream;
  } else {
    alert('無法開啟鏡頭。請至瀏覽器的網站設定中允許相機權限後再試一次。');
    goTo('layout');
  }
}

function updateShotProgress(){
  const SHOTS = getShotsRequired();
  document.querySelectorAll('#shotProgress .shot-dot').forEach((dot, i)=>{
    dot.classList.toggle('done', i < state.shots.length);
    dot.classList.toggle('current', i === state.shots.length && state.shots.length < SHOTS);
  });
  // 更新按鈕文字
  const btn = document.getElementById('btnConfirmShot');
  if(state.shots.length === 0){
    btn.textContent = '開始拍照';
  } else if(state.shots.length >= SHOTS){
    btn.textContent = '列印照片';
  } else {
    btn.textContent = `第 ${state.shots.length + 1} 張`;
  }
}

function resetCameraState(){
  state.shotState = 'live'; state.capturedDataUrl = null; state.counting = false;
  document.getElementById('video').classList.remove('hide');
  document.getElementById('capturedCanvas').classList.remove('show');
  document.getElementById('btnConfirmShot').disabled = false;
}

document.getElementById('btnCameraBack').addEventListener('click', ()=>{
  if(state.stream) state.stream.getTracks().forEach(t=>t.stop());
  state.shots = [];
  resetCameraState();
  goTo('frames');
});

document.getElementById('btnConfirmShot').addEventListener('click', ()=>{
  if(state.counting) return;
  if(state.shotState === 'live'){
    startCountdownThenShoot();
  }
  // 拍完後自動進入下一張，不需手動確認
});

function setCamButtonsDisabled(d){
  document.getElementById('btnConfirmShot').disabled = d;
}

function startCountdownThenShoot(){
  state.counting = true; setCamButtonsDisabled(true);
  const numEl = document.getElementById('countdownNum');
  let n = 3; showCountdownNumber(numEl, n);
  const interval = setInterval(()=>{
    n--;
    if(n > 0){ showCountdownNumber(numEl, n); }
    else{
      clearInterval(interval);
      setTimeout(()=>{ takeSnapshot(); state.counting = false; setCamButtonsDisabled(false); }, 700);
    }
  }, 1000);
}

function showCountdownNumber(el, n){
  el.textContent = n; el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
}

function takeSnapshot(){
  const video = document.getElementById('video');
  const canvas = document.getElementById('capturedCanvas');
  const flash = document.getElementById('flashOverlay');
  flash.classList.remove('fire'); void flash.offsetWidth; flash.classList.add('fire');

  // 拍攝時依照layout決定輸出比例
  const isSquare = state.layout === '2x2';
  const snapW = isSquare ? 552 : 552;
  const snapH = isSquare ? 552 : 470;
  canvas.width = snapW; canvas.height = snapH;
  const ctx = canvas.getContext('2d');
  drawVideoCover(ctx, video, snapW, snapH, true);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.92);

  // 立即接受這張照片
  state.shots.push(dataUrl);
  state.shotState = 'live';
  updateShotProgress();

  const SHOTS = getShotsRequired();
  if(state.shots.length >= SHOTS){
    // 顯示相框覆蓋（若有）
    const overlay = document.getElementById('cameraFrameOverlay');
    if(state.selectedFrame && state.selectedFrame.src){
      overlay.src = state.selectedFrame.src; overlay.style.display = 'block';
    }
    setTimeout(()=>{ finishCamera(); }, 400);
  } else {
    // 顯示已拍的數量後自動開始下一張倒數
    // 若已拍超過1張才顯示相框預覽
    const overlay = document.getElementById('cameraFrameOverlay');
    if(state.shots.length >= (SHOTS === 3 ? 2 : 2) && state.selectedFrame && state.selectedFrame.src){
      overlay.src = state.selectedFrame.src; overlay.style.display = 'block';
    }
    // 短暫閃白後直接重置並自動開始下一張倒數
    setTimeout(()=>{
      resetCameraState();
      startCountdownThenShoot();
    }, 600);
  }
}

// 計算「cover」裁切：把來源尺寸等比例裁切去填滿目標尺寸，回傳來源圖上要取用的矩形
function coverCropRect(srcW, srcH, destW, destH){
  const sr = srcW/srcH, tr = destW/destH;
  if(sr > tr){ const sh=srcH, sw=sh*tr; return { sx:(srcW-sw)/2, sy:0, sw, sh }; }
  const sw=srcW, sh=sw/tr; return { sx:0, sy:(srcH-sh)/2, sw, sh };
}

function drawVideoCover(ctx, video, W, H, mirror){
  const {sx,sy,sw,sh} = coverCropRect(video.videoWidth, video.videoHeight, W, H);
  ctx.save();
  if(mirror){ ctx.translate(W,0); ctx.scale(-1,1); }
  ctx.drawImage(video, sx,sy,sw,sh, 0,0,W,H);
  ctx.restore();
}

function drawImageCover(ctx, img, x, y, w, h){
  const {sx,sy,sw,sh} = coverCropRect(img.naturalWidth, img.naturalHeight, w, h);
  ctx.drawImage(img, sx,sy,sw,sh, x,y,w,h);
}

function finishCamera(){
  if(state.stream) state.stream.getTracks().forEach(t=>t.stop());
  goTo('printing');
  composeAndPrint();
}

/* ---------- 4. 列印中 ---------- */
document.getElementById('btnPrintBack').addEventListener('click', ()=>{
  const popup = document.getElementById('donePopup');
  if(popup.classList.contains('open')){
    // 完成畫面：返回首頁
    popup.classList.remove('open');
    document.getElementById('printNavTitle').textContent = '照片列印中';
    document.getElementById('printingStageInfo').style.display = '';
    resetToWelcome();
  } else {
    // 列印中：返回拍照（startCamera 內部會切換畫面）
    startCamera();
  }
});

function loadImage(src){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    img.onload = ()=>resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

// 2×3：3張照片，左右各印一份（共6格），框為552×470px，置上，下方有空間做裝飾
function draw2x3Layout(ctx, images){
  const FRAME_W = 552, FRAME_H = 470;
  const scale = OUT_W / (FRAME_W * 2 + GRID_GAP * 3);
  const cellW = Math.round(FRAME_W * scale);
  const cellH = Math.round(FRAME_H * scale);
  const gap = Math.round(GRID_GAP * scale);
  for(let col = 0; col < 2; col++){
    const x = gap + col * (cellW + gap);
    for(let row = 0; row < 3; row++){
      const y = gap + row * (cellH + gap);
      drawImageCover(ctx, images[row], x, y, cellW, cellH);
    }
  }
}

// 2×2：4張照片各佔一格，框為552×552px，左二右二，置中，上下有空間
function draw2x2Layout(ctx, images){
  const FRAME_W = 552, FRAME_H = 552;
  const scale = OUT_W / (FRAME_W * 2 + GRID_GAP * 3);
  const cellW = Math.round(FRAME_W * scale);
  const cellH = Math.round(FRAME_H * scale);
  const gap = Math.round(GRID_GAP * scale);
  const totalGridH = cellH * 2 + gap * 3;
  const startY = Math.round((OUT_H - totalGridH) / 2);
  images.forEach((img, i)=>{
    const col = i % 2, row = Math.floor(i/2);
    const x = gap + col*(cellW+gap);
    const y = startY + gap + row*(cellH+gap);
    drawImageCover(ctx, img, x, y, cellW, cellH);
  });
}

async function composeAndPrint(){
  // 重置狀態
  document.getElementById('printNavTitle').textContent = '照片列印中';
  document.getElementById('printingStageInfo').style.display = '';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('donePopup').classList.remove('open');

  const canvas = document.getElementById('resultCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = OUT_W; canvas.height = OUT_H;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, OUT_W, OUT_H);

  const images = await Promise.all(state.shots.map(loadImage));

  if(state.layout === '2x3'){
    draw2x3Layout(ctx, images);
  } else {
    draw2x2Layout(ctx, images);
  }

  if(state.selectedFrame && state.selectedFrame.src){
    const frameImg = await loadImage(state.selectedFrame.src).catch(()=>null);
    if(frameImg) ctx.drawImage(frameImg, 0, 0, OUT_W, OUT_H);
  }

  const finalDataUrl = canvas.toDataURL('image/jpeg', 0.92);
  sendEmailInBackground(finalDataUrl);
  await animateProgress(30000);
  await showDownloadStage(finalDataUrl);
}

function animateProgress(duration){
  return new Promise(resolve=>{
    const fill = document.getElementById('progressFill');
    const start = performance.now();
    function tick(now){
      const p = Math.min(1,(now-start)/duration);
      fill.style.width = (p*100)+'%';
      if(p<1) requestAnimationFrame(tick); else resolve();
    }
    requestAnimationFrame(tick);
  });
}

async function sendEmailInBackground(finalDataUrl){
  try{
    if(EMAILJS_CONFIG.enabled && window.emailjs){
      await emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId, {
        to_email: EMAILJS_CONFIG.toEmail, image_data: finalDataUrl,
        time: new Date().toLocaleString()
      }, EMAILJS_CONFIG.publicKey);
    }
  }catch(err){ console.error('Email 傳送失敗', err); }
}

async function uploadToImgbb(dataUrl){
  const base64 = dataUrl.split(',')[1];
  const form = new FormData(); form.append('image', base64);
  const resp = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_CONFIG.apiKey}`,{ method:'POST', body:form });
  const json = await resp.json();
  if(json && json.success) return json.data.url || json.data.display_url;
  throw new Error('imgbb upload failed');
}

async function showDownloadStage(finalDataUrl){
  document.getElementById('printingStageInfo').style.display = 'none';
  document.getElementById('printNavTitle').textContent = '照片完成！';

  const popup = document.getElementById('donePopup');
  const qrWrap = document.getElementById('popupQrWrap');
  const qrLabel = document.getElementById('popupQrLabel');
  const qrImg = document.getElementById('popupQrImg');

  // 用 QR Server API 產生 QR code（穩定、免費、不需金鑰）— 純 <img> src
  function makeQrCodeUrl(url){
    const encoded = encodeURIComponent(url);
    return `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encoded}`;
  }

  // 開啟 popup
  popup.classList.add('open');

  if(IMGBB_CONFIG.enabled){
    qrLabel.textContent = '正在產生下載連結…';
    qrWrap.style.display = '';
    try{
      const url = await uploadToImgbb(finalDataUrl);
      qrImg.src = makeQrCodeUrl(url);
      qrLabel.textContent = '';
    }catch(err){
      console.error('上傳失敗', err);
      qrWrap.style.display = 'none';
      qrLabel.textContent = '無法上傳照片，請改用 Email 接收';
    }
  } else {
    // imgbb 尚未設定時的示範 QR（指向品牌官網）
    qrImg.src = makeQrCodeUrl('https://pluddie.studio');
    qrWrap.style.display = '';
    qrLabel.textContent = '設定 imgbb 後即可掃碼下載照片';
  }
}

document.getElementById('btnNextShot').addEventListener('click', ()=>{
  document.getElementById('donePopup').classList.remove('open');
  resetToWelcome();
});
</script>
