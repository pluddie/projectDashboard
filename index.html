<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Dashboard</title>
<style>
:root{
  --bg:#D8E8FA;
  --glass:rgba(255,255,255,.76);--glass-hdr:rgba(255,255,255,.93);--glass-bdr:rgba(255,255,255,.85);--page-hdr:rgba(255,255,255,.88);
  --text:#1a2540;--text-sub:#3a5080;--text-muted:#6a88b8;
  --accent:#3A5FE8;--accent2:#3AABF2;--accent-lt:rgba(58,95,232,.09);--accent-md:rgba(58,95,232,.17);
  --divider:rgba(58,95,232,.10);--hdr-title:#1a3070;--row-even:rgba(58,95,232,.03);--row-hover:rgba(58,95,232,.065);
  --row-solid-proj:#eef2fc;--row-solid-sub:#f7f9fd;
  --lw:150px; /* label column width */
  --rh-proj:36px; --rh-sub:30px; /* row heights, updated by JS */
}
[data-theme="dark"]{
  --bg:#0b1222;
  --glass:rgba(14,22,48,.62);--glass-hdr:rgba(14,22,48,.88);--glass-bdr:rgba(255,255,255,.09);--page-hdr:rgba(10,18,40,.82);
  --text:#ddeaff;--text-sub:#7ea4d4;--text-muted:#4e6e9a;
  --accent:#5b83ff;--accent2:#3AABF2;--accent-lt:rgba(91,131,255,.13);--accent-md:rgba(91,131,255,.24);
  --divider:rgba(91,131,255,.12);--hdr-title:#8ab0ff;--row-even:rgba(91,131,255,.04);--row-hover:rgba(91,131,255,.09);
  --row-solid-proj:#152040;--row-solid-sub:#101a34;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI','PingFang TC',sans-serif;font-size:13px;color:var(--text)}
body{background:var(--bg);position:relative}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 18% 28%,rgba(58,95,232,.18) 0%,transparent 58%),
             radial-gradient(ellipse at 82% 72%,rgba(58,171,242,.15) 0%,transparent 55%);
  pointer-events:none;z-index:0}

#app{position:relative;z-index:1;width:100vw;height:100vh;display:flex;flex-direction:column;padding:11px;gap:6px;overflow:hidden}

/* PAGE HEADER */
#page-header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:44px;
  background:var(--page-hdr);backdrop-filter:blur(22px) saturate(1.6);-webkit-backdrop-filter:blur(22px) saturate(1.6);
  border:1px solid var(--glass-bdr);border-radius:14px;box-shadow:0 2px 16px rgba(58,95,232,.08)}
#page-title{font-size:18px;font-weight:800;background:linear-gradient(90deg,var(--accent) 0%,var(--accent2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.02em;outline:none}
.hdr-btns{display:flex;gap:5px;align-items:center}
.hdr-btn{height:30px;padding:0 11px;border-radius:8px;border:none;cursor:pointer;background:var(--accent-lt);color:var(--accent);
  font-size:11px;font-weight:600;display:flex;align-items:center;gap:4px;transition:background .15s;white-space:nowrap}
.hdr-btn:hover{background:var(--accent-md)}
.hdr-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

/* GLASS CARD */
.card{background:var(--glass);backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);
  border:1px solid var(--glass-bdr);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 4px 24px rgba(58,95,232,.07),0 1px 4px rgba(0,0,0,.04)}
.card-hdr{flex-shrink:0;display:flex;align-items:center;padding:5px 12px;gap:8px;
  background:var(--glass-hdr);border-bottom:1px solid var(--divider)}
.card-title{font-size:12px;font-weight:700;color:var(--hdr-title);letter-spacing:.05em;text-transform:uppercase;flex-shrink:0}
.card-hdr-right{display:flex;gap:4px;align-items:center;margin-left:auto;flex-shrink:0}
.card-btn{height:24px;padding:0 8px;border-radius:6px;border:none;cursor:pointer;background:var(--accent-lt);color:var(--accent);
  font-size:11px;font-weight:600;display:flex;align-items:center;gap:3px;transition:background .15s;white-space:nowrap}
.card-btn:hover{background:var(--accent-md)}
.card-btn svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.card-body{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column}

/* Gantt settings dropdown panel */
.gantt-settings-panel{position:absolute;top:46px;right:11px;z-index:120;width:min(230px,calc(100vw - 22px));
  background:var(--glass-hdr);border:1px solid var(--glass-bdr);border-radius:12px;padding:12px;
  box-shadow:0 10px 32px rgba(0,0,0,.16);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  display:flex;flex-direction:column;gap:10px}
.gsp-row{display:flex;align-items:center;gap:8px}
.gsp-label{font-size:11px;font-weight:600;color:var(--text-sub);flex:1;display:flex;flex-direction:column;line-height:1.3}
.gsp-hint{font-size:9px;font-weight:500;color:var(--text-muted)}
.gsp-divider{height:1px;background:var(--divider);margin:0}
.gsp-toggle-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.gsp-toggle{position:relative;width:34px;height:19px;flex-shrink:0}
.gsp-toggle input{opacity:0;width:0;height:0}
.gsp-toggle-slider{position:absolute;inset:0;border-radius:10px;background:#c5d5e8;cursor:pointer;transition:.2s}
.gsp-toggle-slider::before{content:'';position:absolute;left:2px;bottom:2px;width:15px;height:15px;border-radius:50%;
  background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.gsp-toggle input:checked+.gsp-toggle-slider{background:var(--accent)}
.gsp-toggle input:checked+.gsp-toggle-slider::before{transform:translateX(15px)}
[data-theme="dark"] .gsp-toggle-slider{background:#2a3550}
.zoom-slider{width:64px;height:3px;accent-color:var(--accent);cursor:pointer;border:none;outline:none}
.zoom-val{font-size:10px;font-weight:700;color:var(--accent);min-width:24px;text-align:right}
.gsp-date-input{flex-shrink:0;width:118px;margin-left:auto;padding:4px 8px;border-radius:6px;border:1px solid var(--divider);background:var(--glass);
  color:var(--text);font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;outline:none;text-align:right;
  transition:border-color .15s,background .15s}
.gsp-date-input:hover{border-color:var(--accent)}
.gsp-date-input:focus{border-color:var(--accent);background:var(--accent-lt)}

/* MAIN */
#main-content{flex:1;min-height:0;display:flex;flex-direction:column;gap:6px;overflow:hidden}
#gantt-card{flex:1;min-height:0;position:relative}

/* ═══════════════════════════════════════════════════
   GANTT LAYOUT — single scroll container approach
   
   Structure:
     #gantt-card > .card-body > #gantt-wrap
       #gantt-fixed-hdr   ← sticky, never scrolls (year-nav + month/week header)
       #gantt-scroll-area ← scrolls both X and Y
         #gantt-rows      ← all rows, each row has label+chart side by side
   ═══════════════════════════════════════════════════ */

#gantt-wrap{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* Fold handle — sits on the seam between the label column and the chart;
   the arrow is hidden by default (keeps screenshots/reports clean) and
   only fades in on hover over the seam. Click collapses/expands the label
   column so the timeline gets more horizontal room. */
.gantt-fold-handle{position:absolute;top:0;bottom:0;left:var(--lw);width:18px;margin-left:-9px;z-index:55;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:left .22s ease}
/* When collapsed, --lw is 0 — centering the handle on the seam would push
   half of it past the container's left edge and get clipped by
   #gantt-wrap's overflow:hidden. Pull it fully inside instead. */
#gantt-wrap.lbl-collapsed .gantt-fold-handle{left:0;margin-left:0;width:20px}
.gfh-arrow{width:20px;height:20px;border-radius:50%;background:var(--accent-lt);color:var(--accent);
  border:1px solid var(--glass-bdr);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;line-height:1;
  opacity:0;transition:opacity .15s,background .15s,transform .2s,border-color .15s;box-shadow:0 2px 8px rgba(0,0,0,.14)}
.gantt-fold-handle:hover .gfh-arrow{opacity:1;background:var(--accent-md);border-color:var(--accent)}
#gantt-wrap.lbl-collapsed .gfh-arrow{transform:rotate(180deg)}

/* Fixed header — sits above scroll area, never moves */
#gantt-fixed-hdr{flex-shrink:0;display:flex;background:var(--glass-hdr);border-bottom:1px solid var(--divider);z-index:10}
#gantt-fixed-hdr-label{width:var(--lw);min-width:var(--lw);flex-shrink:0;display:flex;align-items:center;
  padding:0 10px;border-right:1px solid var(--divider);overflow:hidden;
  transition:width .22s ease,min-width .22s ease,padding .22s ease,border-color .22s ease}
#gantt-wrap.lbl-collapsed #gantt-fixed-hdr-label{padding:0;border-right-color:transparent}
.year-nav{display:flex;align-items:center;gap:4px;width:100%}
.year-nav-btn{width:22px;height:22px;border-radius:6px;border:none;cursor:pointer;background:var(--accent-lt);color:var(--accent);
  font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:background .15s}
.year-nav-btn:hover{background:var(--accent-md)}
.year-nav-label{flex:1;text-align:center;font-size:11px;font-weight:700;color:var(--hdr-title)}
/* chart header sits in same fixed row, scrolls only X via JS mirror */
#gantt-fixed-hdr-chart{flex:1;overflow:hidden} /* no scroll — JS mirrors the X */
#gantt-chart-hdr-inner{display:flex;flex-direction:column;width:max-content}
.gantt-hdr-months{display:flex}
.month-group{display:flex;flex-direction:column}
.month-label{padding:2px 6px;font-size:11px;font-weight:700;color:var(--accent);border-bottom:1px solid var(--divider);
  text-align:center;background:linear-gradient(90deg,rgba(58,95,232,.07),rgba(58,171,242,.07));white-space:nowrap;overflow:hidden}
.week-labels{display:flex}
.week-cell{font-size:8.5px;color:var(--text-muted);text-align:center;font-weight:600;line-height:1.8;flex-shrink:0}
.week-cell.today-wk{color:var(--accent);font-weight:800;background:var(--accent-lt)}

/* Scrollable body — both X and Y */
#gantt-scroll-area{flex:1;min-height:0;overflow:auto}
#gantt-scroll-area::-webkit-scrollbar{width:5px;height:5px}
#gantt-scroll-area::-webkit-scrollbar-thumb{background:var(--accent-lt);border-radius:4px}

/* Each gantt row = label cell + chart cell, side by side */
#gantt-rows{display:flex;flex-direction:column;width:max-content;min-width:100%}
.g-row{display:flex;flex-direction:row;border-bottom:1px solid var(--divider)}
.g-row.proj-row{background:var(--row-even);height:var(--rh-proj)}
.g-row.sub-row{height:var(--rh-sub)}
.g-row.add-row{height:var(--rh-sub)}
.g-row:hover{background:var(--row-hover)}
.g-row.proj-row:hover{background:var(--row-even)} /* keep project bg on hover */
.g-row.collapsed-hidden{display:none}

/* label cell — fixed width, doesn't scroll horizontally */
.g-lbl{width:var(--lw);min-width:var(--lw);flex-shrink:0;display:flex;align-items:center;gap:4px;
  padding:0 7px;border-right:1px solid var(--divider);overflow:hidden;
  position:sticky;left:0;z-index:20;background:var(--glass-hdr);
  transition:width .22s ease,min-width .22s ease,padding .22s ease,border-color .22s ease}
.g-row.proj-row .g-lbl{background:var(--row-solid-proj)}
.g-row.sub-row .g-lbl{padding-left:10px;background:var(--row-solid-sub)}
.g-row.add-row .g-lbl{background:var(--row-solid-sub)}
/* override hover on label cell to match row */
.g-row:hover .g-lbl{background:var(--row-solid-sub)}
.g-row.proj-row:hover .g-lbl{background:var(--row-solid-proj)}
/* fully collapsed: kill padding + border so the column truly shrinks to a hairline */
#gantt-wrap.lbl-collapsed .g-lbl,#gantt-wrap.lbl-collapsed .g-row.sub-row .g-lbl{padding:0;border-right-color:transparent}

/* chart cell — expands to full chart width */
.g-chart{flex:1;position:relative;overflow:hidden}

/* label content */
.row-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;outline:none;cursor:text;
  border-radius:3px;padding:1px 2px;transition:background .12s;font-size:12px}
.g-row.proj-row .row-name{font-weight:700;font-size:12px;color:var(--hdr-title)}
.g-row.sub-row .row-name{font-size:11px;color:var(--text-sub)}
.row-name:hover{background:rgba(58,95,232,.07)}
.row-name:focus{background:rgba(58,95,232,.12);white-space:normal;text-overflow:clip}
.row-act{width:18px;height:18px;border-radius:4px;border:none;cursor:pointer;background:transparent;color:var(--text-muted);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .12s,color .12s}
.row-act:hover{background:var(--accent-lt);color:var(--accent)}
.row-act.del:hover{background:rgba(239,68,68,.12);color:#ef4444}
.row-act svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.collapse-btn{width:14px;height:14px;border:none;cursor:pointer;background:transparent;color:var(--text-muted);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s,color .15s}
.collapse-btn:hover{color:var(--accent)}
.collapse-btn.closed{transform:rotate(-90deg)}
.collapse-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* Add project button row */
.add-proj-btn{display:flex;align-items:center;gap:5px;padding:4px 10px;cursor:pointer;font-size:11px;color:var(--text-muted);
  font-weight:600;border:none;background:transparent;transition:color .15s,background .15s;width:100%;height:100%}
.add-proj-btn:hover{color:var(--accent);background:var(--accent-lt)}
.add-proj-btn svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

/* BAR */
.gantt-bars-layer{position:absolute;inset:0;pointer-events:none}
.gantt-bar-wrap{position:absolute;pointer-events:auto;z-index:2;height:calc(100% - 10px);top:5px}
.gantt-bar-outer{position:relative;height:100%;border-radius:999px;overflow:hidden;cursor:pointer;transition:filter .15s}
.gantt-bar-outer:hover{filter:brightness(1.08)}
.gantt-bar-track{position:absolute;inset:0;border-radius:999px;opacity:.20}
.gantt-bar-fill{position:absolute;left:0;top:0;bottom:0;border-radius:0;min-width:0}
.gantt-bar-label{position:absolute;inset:0;display:flex;align-items:center;font-size:10px;font-weight:700;color:#fff;
  pointer-events:none;z-index:3;text-shadow:0 1px 2px rgba(0,0,0,.4);white-space:nowrap;overflow:hidden;padding:0 10px}

/* Build Name tag — sits OUTSIDE the bar pill, immediately to its left */
.gantt-build-tag{position:absolute;right:100%;top:50%;transform:translateY(-50%);margin-right:6px;
  font-size:10px;font-weight:700;white-space:nowrap;pointer-events:none;z-index:3;
  max-width:90px;overflow:hidden;text-overflow:ellipsis}

/* TODAY / NOW line — draggable */
.now-line-hit{position:absolute;top:0;bottom:0;width:18px;margin-left:-9px;z-index:9;cursor:ew-resize;
  touch-action:none;display:flex;justify-content:center}
.now-line-visual{width:2px;height:100%;border-radius:2px;pointer-events:none;
  background:linear-gradient(180deg,var(--accent2),rgba(58,171,242,.3));transition:width .12s,box-shadow .12s}
.now-line-hit:hover .now-line-visual,.now-line-hit.dragging .now-line-visual{width:3px}
/* Floating date tooltip — fixed to the viewport (not the scroll area) so it
   stays visible and follows the cursor while dragging, regardless of
   vertical scroll position. */
.now-line-floating-tip{position:fixed;transform:translate(-50%,0);background:var(--accent);color:#fff;
  font-size:11px;font-weight:700;padding:4px 9px;border-radius:7px;white-space:nowrap;pointer-events:none;
  z-index:1000;box-shadow:0 6px 16px rgba(0,0,0,.22)}
.now-line-bar-badge{position:absolute;top:50%;left:0;transform:translate(-50%,-50%);font-size:9px;font-weight:800;
  color:#fff;background:rgba(0,0,0,.62);padding:1px 5px;border-radius:8px;white-space:nowrap;
  pointer-events:none;z-index:11;box-shadow:0 1px 4px rgba(0,0,0,.3)}

/* BOTTOM ROW */
#bottom-row{flex-shrink:0;height:210px;display:flex;gap:6px}
#target-card{width:25%;flex-shrink:0}
#updates-card{flex:1}
#target-body{padding:10px 14px;flex:1;min-height:0;overflow:auto}
#target-text{width:100%;min-height:60px;font-size:12px;color:var(--text);line-height:1.75;outline:none;font-family:inherit}
#target-text:empty::before{content:attr(data-placeholder);color:var(--text-muted)}
#target-text ul{margin:0 0 0 16px;padding:0}
#target-text li{margin:2px 0}
/* Target toolbar — compact icon buttons that sit inline in the card header */
.tgt-tool-btn{width:24px;height:24px;border-radius:6px;border:none;cursor:pointer;background:var(--accent-lt);color:var(--accent);
  font-size:12px;font-family:inherit;display:flex;align-items:center;justify-content:center;transition:background .15s}
.tgt-tool-btn:hover{background:var(--accent-md)}
.tgt-tool-btn.active{background:var(--accent);color:#fff}
.tgt-color-wrap{position:relative;width:24px;height:24px;border-radius:6px;background:var(--accent-lt);
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s}
.tgt-color-wrap:hover{background:var(--accent-md)}
.tgt-color-wrap input[type=color]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;border:none;padding:0}
.tgt-color-swatch{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--accent);pointer-events:none;background:#3a5fe8}
#updates-body{padding:6px 10px;flex:1;min-height:0;overflow:auto;display:flex;flex-direction:column;gap:2px}
.update-item{display:flex;align-items:center;gap:7px;padding:3px 4px;border-radius:6px;min-height:27px}
.update-item:hover{background:var(--row-hover)}
.status-light{width:9px;height:9px;border-radius:50%;flex-shrink:0;cursor:pointer;transition:transform .15s}
.status-light:hover{transform:scale(1.3)}
.status-light.green{background:#22c55e;box-shadow:0 0 5px rgba(34,197,94,.55)}
.status-light.yellow{background:#eab308;box-shadow:0 0 5px rgba(234,179,8,.55)}
.status-light.red{background:#ef4444;box-shadow:0 0 5px rgba(239,68,68,.55)}
.update-text{flex:1;font-size:12px;outline:none;border-radius:3px;min-width:0;word-break:break-word;cursor:text;line-height:1.5;padding:1px 2px;transition:background .12s}
.update-text:hover{background:rgba(58,95,232,.07)}
.update-text:focus{background:rgba(58,95,232,.12)}
.update-del{width:17px;height:17px;border-radius:4px;border:none;cursor:pointer;background:transparent;color:var(--text-muted);
  font-size:12px;opacity:0;transition:opacity .15s,background .15s;display:flex;align-items:center;justify-content:center}
.update-item:hover .update-del{opacity:1}
.update-del:hover{background:rgba(239,68,68,.15);color:#ef4444}
.update-add-row{display:flex;align-items:center;gap:7px;padding:3px 4px;opacity:.45;font-size:11px;cursor:pointer;transition:opacity .15s;border-radius:6px}
.update-add-row:hover{opacity:.85;background:var(--row-hover)}

/* ROW EDITOR POPUP */
.rep-overlay{display:none;position:fixed;inset:0;z-index:599;background:rgba(0,0,0,.18)}
.rep-overlay.show{display:block}
.row-editor-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--glass-hdr);
  border:1px solid var(--glass-bdr);border-radius:16px;padding:16px;box-shadow:0 12px 48px rgba(0,0,0,.22);
  z-index:600;width:min(420px,calc(100vw - 32px));max-height:85vh;overflow-y:auto;display:flex;flex-direction:column;gap:11px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.rep-header{display:flex;align-items:center;justify-content:space-between;gap:6px}
.rep-header-title-wrap{display:flex;align-items:center;justify-content:center;gap:6px;flex:1;min-width:0}
.rep-title-color-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;cursor:pointer;border:2px solid var(--glass-bdr);transition:transform .12s}
.rep-title-color-dot:hover{transform:scale(1.15)}
.rep-header-title{font-size:13px;font-weight:700;color:var(--hdr-title);text-align:center;outline:none;cursor:text;
  border-radius:4px;padding:1px 4px;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rep-header-title:hover{background:rgba(58,95,232,.07)}
.rep-header-title:focus{background:rgba(58,95,232,.12);white-space:normal;text-overflow:clip}
.rep-header-actions{display:flex;gap:6px}
.rep-icon-btn{width:28px;height:28px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;background:var(--accent-lt);color:var(--accent);transition:background .15s,transform .12s}
.rep-icon-btn:hover{background:var(--accent-md)}
.rep-icon-btn:active{transform:scale(.93)}
.rep-icon-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.3;stroke-linecap:round;stroke-linejoin:round}
.rep-icon-btn.rep-apply{background:rgba(34,197,94,.14);color:#22c55e}
.rep-icon-btn.rep-apply:hover{background:rgba(34,197,94,.24)}
.rep-icon-btn.rep-del{background:rgba(239,68,68,.12);color:#ef4444}
.rep-icon-btn.rep-del:hover{background:rgba(239,68,68,.22)}
.rep-section{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;border-top:1px solid var(--divider);padding-top:8px;margin-top:2px}
.rep-input{padding:6px 9px;border-radius:7px;border:1px solid var(--divider);background:var(--glass);color:var(--text);font-size:12px;font-family:inherit;outline:none;width:100%}
.rep-input:focus{border-color:var(--accent)}
.rep-inline-wheel{display:none;flex-direction:column;gap:9px;padding:12px;border-radius:12px;background:var(--accent-lt)}
.rep-bar-item{display:flex;align-items:center;gap:5px;padding:5px 6px;border-radius:8px;background:var(--accent-lt);margin-bottom:4px}
.rep-bar-tag{flex:1;min-width:0;padding:4px 7px;border-radius:6px;border:1px solid transparent;background:var(--glass);color:var(--text);font-size:11px;font-family:inherit;outline:none}
.rep-bar-tag:focus{border-color:var(--accent)}
.rep-bar-range-btn{flex-shrink:0;padding:4px 8px;border-radius:6px;border:1px solid transparent;background:var(--glass);
  color:var(--text-sub);font-size:10px;font-family:inherit;cursor:pointer;transition:border-color .15s,background .15s;white-space:nowrap}
.rep-bar-range-btn:hover{border-color:var(--accent);background:var(--accent-lt);color:var(--accent)}
.rep-bar-del{width:20px;height:20px;border-radius:5px;border:none;cursor:pointer;flex-shrink:0;background:transparent;color:var(--text-muted);
  display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s}
.rep-bar-del:hover{background:rgba(239,68,68,.14);color:#ef4444}
.rep-bar-del svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.rep-add-bar{width:100%;height:28px;border-radius:8px;border:1px dashed var(--divider);cursor:pointer;background:transparent;
  color:var(--text-muted);font-size:11px;font-weight:600;transition:background .15s,color .15s,border-color .15s}
.rep-add-bar:hover{background:var(--accent-lt);color:var(--accent);border-color:var(--accent)}

/* DATE RANGE CALENDAR PICKER */
.drp-popup{position:fixed;z-index:900;width:min(248px,calc(100vw - 24px));background:var(--glass-hdr);border:1px solid var(--glass-bdr);
  border-radius:14px;padding:12px;box-shadow:0 12px 36px rgba(0,0,0,.2);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  display:flex;flex-direction:column;gap:8px}
.drp-hdr{display:flex;align-items:center;justify-content:space-between}
.drp-nav-btn{width:24px;height:24px;border-radius:6px;border:none;cursor:pointer;background:var(--accent-lt);color:var(--accent);
  font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:background .15s}
.drp-nav-btn:hover{background:var(--accent-md)}
.drp-month-lbl{font-size:12px;font-weight:700;color:var(--hdr-title)}
.drp-range-display{font-size:11px;font-weight:600;color:var(--accent);text-align:center;background:var(--accent-lt);
  border-radius:7px;padding:4px 6px}
.drp-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.drp-dow{text-align:center;font-size:9px;font-weight:700;color:var(--text-muted);text-transform:uppercase}
.drp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.drp-day{aspect-ratio:1;border:none;background:transparent;border-radius:6px;cursor:pointer;font-size:11px;
  color:var(--text);display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s;position:relative}
.drp-day:hover{background:var(--accent-md)}
.drp-day.in-range{background:var(--accent-lt)}
.drp-day.range-start,.drp-day.range-end{background:var(--accent);color:#fff;font-weight:700}
.drp-day.is-today:not(.range-start):not(.range-end){box-shadow:inset 0 0 0 1.5px var(--accent2)}
.drp-actions{display:flex}
.drp-done-btn{width:100%;height:28px;border-radius:8px;border:none;cursor:pointer;background:var(--accent);color:#fff;
  font-size:12px;font-weight:700;transition:filter .15s}
.drp-done-btn:hover{filter:brightness(1.08)}

/* CONFIRM */
.confirm-overlay{display:none;position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.25)}
.confirm-overlay.show{display:flex;align-items:center;justify-content:center}
.confirm-box{background:var(--glass-hdr);border:1px solid var(--glass-bdr);border-radius:16px;padding:24px;
  box-shadow:0 16px 48px rgba(0,0,0,.22);width:min(300px,calc(100vw - 32px));display:flex;flex-direction:column;gap:16px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.confirm-title{font-size:13px;font-weight:700;color:var(--hdr-title);text-align:center}
.confirm-msg{font-size:12px;color:var(--text-sub);text-align:center;line-height:1.6}
.confirm-actions{display:flex;gap:8px}
.confirm-btn{flex:1;height:34px;border-radius:10px;border:none;cursor:pointer;font-size:12px;font-weight:600}
.confirm-btn.yes{background:rgba(239,68,68,.14);color:#ef4444}.confirm-btn.yes:hover{background:rgba(239,68,68,.24)}
.confirm-btn.no{background:var(--accent-lt);color:var(--accent)}.confirm-btn.no:hover{background:var(--accent-md)}

/* SIDEBAR */
#sidebar{position:fixed;top:0;right:-290px;width:290px;height:100vh;background:var(--glass-hdr);
  backdrop-filter:blur(22px) saturate(1.6);-webkit-backdrop-filter:blur(22px) saturate(1.6);
  border-left:1px solid var(--glass-bdr);z-index:400;display:flex;flex-direction:column;gap:14px;padding:20px;
  transition:right .25s cubic-bezier(.4,0,.2,1);box-shadow:-4px 0 28px rgba(58,95,232,.10)}
#sidebar.open{right:0}
#sidebar-overlay{display:none;position:fixed;inset:0;z-index:399;background:rgba(0,0,0,.12)}
#sidebar-overlay.show{display:block}
#sidebar-close{align-self:flex-end;width:28px;height:28px;border-radius:7px;border:none;background:var(--accent-lt);
  color:var(--accent);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.sb-section{display:flex;flex-direction:column;gap:7px}
.sb-label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em}
.sb-row{display:flex;align-items:center;justify-content:space-between}
.toggle{position:relative;width:36px;height:20px}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;border-radius:10px;background:#c5d5e8;cursor:pointer;transition:.2s}
.toggle-slider::before{content:'';position:absolute;left:2px;bottom:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle input:checked+.toggle-slider{background:var(--accent)}
.toggle input:checked+.toggle-slider::before{transform:translateX(16px)}
.sb-btn{width:100%;height:32px;border-radius:9px;border:none;cursor:pointer;background:var(--accent-lt);color:var(--accent);font-size:12px;font-weight:600;transition:background .15s}
.sb-btn:hover{background:var(--accent-md)}

/* COLOR WHEEL */
.cwp-canvas-wrap{display:flex;justify-content:center}
.cwp-preview-row{display:flex;align-items:center;gap:8px}
.cwp-preview{width:34px;height:34px;border-radius:8px;flex-shrink:0;border:2px solid var(--glass-bdr)}
.cwp-hex-input{flex:1;padding:5px 8px;border-radius:7px;border:1px solid var(--divider);background:var(--glass);
  color:var(--text);font-size:11px;font-family:'Courier New',monospace;font-weight:600;outline:none}
.cwp-hex-input:focus{border-color:var(--accent)}

@media(max-width:1024px){
  html,body{overflow-y:auto;overflow-x:hidden}
  #app{height:auto;min-height:100svh;overflow:visible}
  #bottom-row{height:auto;flex-direction:column}
  #target-card{width:100%}
  #gantt-card{min-height:400px;flex:none}
  #main-content{overflow:visible}
}
</style>
</head>

            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>

      <!-- Settings dropdown panel (hidden by default) -->

        <div class="gsp-row">
          <span class="gsp-label">Column Width</span>

        <div class="gsp-divider"></div>

          <span class="gsp-label">Build Name <span class="gsp-hint">e.g. P0</span></span>

          <span class="gsp-label">Item Name <span class="gsp-hint">e.g. PDFC</span></span>

        <div class="gsp-toggle-row">
          <span class="gsp-label">Today Line <span class="gsp-hint">vertical NOW marker</span></span>

      <div class="card-body">

<script>
/* ═══ CLOSE / REFRESH WARNING ═══
   Remind the user to Export before they lose unsaved edits. We only
   show the prompt if data has actually changed from the initial defaults
   (tracked by _dirty), so a fresh open-and-close doesn't nag them. */
let _dirty=false;
let _initialRender=true;
function markDirty(){if(!_initialRender)_dirty=true;}
window.addEventListener('beforeunload',e=>{
  if(!_dirty)return;
  e.preventDefault();
  e.returnValue=''; // required for Chrome/Edge to show the dialog
});

/* ═══ CONSTANTS & STATE ═══ */
// One-time cleanup: an earlier version of this file auto-saved to
// localStorage. This version doesn't use localStorage at all — refreshing
// always returns to the default data below, and Export is the only way
// to keep your edits — so wipe out that old saved data if present.
try{localStorage.removeItem('projectDashboard.state.v1');}catch(err){}
const DEFAULT_COLOR='#3A5FE8';
let WEEK_W=22;          // px per week column
let RH_PROJ=36;         // project row height
let showBuildName=true; // display Build name (e.g. "P0") on bars
let showItemName=true;  // display Item name (e.g. "PDFC") on bars
let showTodayLine=true; // display the NOW/today vertical line
let showProgress=true;  // display progress fill (split by today line)
let RH_SUB=30;          // sub-group row height
let simulatedToday=null;
let viewYear=2026;      // year currently shown in the nav label (updates as you scroll)
/* The timeline itself spans a wide, fixed range so scrolling left/right
   feels continuous across many years — it is NOT re-generated per year.
   Year nav buttons / Today just scroll to the right horizontal position. */
const RANGE_YEARS_BEFORE=6, RANGE_YEARS_AFTER=6;
const BASE_YEAR=2026;
let viewStart=new Date(BASE_YEAR-RANGE_YEARS_BEFORE,0,4);
let viewEnd=new Date(BASE_YEAR+RANGE_YEARS_AFTER,11,27);
let idCnt=100;
const newId=()=>'id'+(++idCnt);
let confirmCb=null;

/* ═══ DATA ═══ */
function makePhaseBars(pairs){
  return['PDFC','SOP','Mini','Main'].map((n,i)=>({id:newId(),label:n,start:pairs[i][0],end:pairs[i][1]}));
}
let projects=[
  {id:'p1',name:'Project 1',color:'#3A5FE8',collapsed:false,subgroups:[
    {id:newId(),name:'P0',bars:makePhaseBars([[new Date(2026,0,5),new Date(2026,0,19)],[new Date(2026,0,19),new Date(2026,1,2)],[new Date(2026,1,2),new Date(2026,1,16)],[new Date(2026,1,16),new Date(2026,1,30)]])},
    {id:newId(),name:'P1',bars:makePhaseBars([[new Date(2026,1,16),new Date(2026,2,2)],[new Date(2026,2,2),new Date(2026,2,16)],[new Date(2026,2,16),new Date(2026,3,6)],[new Date(2026,3,6),new Date(2026,3,20)]])},
    {id:newId(),name:'EVT',bars:makePhaseBars([[new Date(2026,3,6),new Date(2026,3,20)],[new Date(2026,3,20),new Date(2026,4,4)],[new Date(2026,4,4),new Date(2026,4,18)],[new Date(2026,4,18),new Date(2026,5,1)]])},
    {id:newId(),name:'DVT',bars:makePhaseBars([[new Date(2026,5,1),new Date(2026,5,15)],[new Date(2026,5,15),new Date(2026,6,6)],[new Date(2026,6,6),new Date(2026,6,20)],[new Date(2026,6,20),new Date(2026,8,7)]])},
    {id:newId(),name:'PVT',bars:makePhaseBars([[new Date(2026,8,7),new Date(2026,8,21)],[new Date(2026,8,21),new Date(2026,9,5)],[new Date(2026,9,5),new Date(2026,9,19)],[new Date(2026,9,19),new Date(2026,10,2)]])}
  ]},
  {id:'p2',name:'Project 2',color:'#3AABF2',collapsed:false,subgroups:[
    {id:newId(),name:'P0',bars:makePhaseBars([[new Date(2026,0,19),new Date(2026,1,2)],[new Date(2026,1,2),new Date(2026,1,16)],[new Date(2026,1,16),new Date(2026,2,2)],[new Date(2026,2,2),new Date(2026,2,16)]])},
    {id:newId(),name:'P1',bars:makePhaseBars([[new Date(2026,2,16),new Date(2026,3,6)],[new Date(2026,3,6),new Date(2026,3,20)],[new Date(2026,3,20),new Date(2026,4,4)],[new Date(2026,4,4),new Date(2026,4,18)]])},
    {id:newId(),name:'EVT',bars:makePhaseBars([[new Date(2026,4,18),new Date(2026,5,1)],[new Date(2026,5,1),new Date(2026,5,15)],[new Date(2026,5,15),new Date(2026,6,6)],[new Date(2026,6,6),new Date(2026,6,20)]])},
    {id:newId(),name:'DVT',bars:makePhaseBars([[new Date(2026,6,20),new Date(2026,8,3)],[new Date(2026,8,3),new Date(2026,8,17)],[new Date(2026,8,17),new Date(2026,9,1)],[new Date(2026,9,1),new Date(2026,9,15)]])},
    {id:newId(),name:'PVT',bars:makePhaseBars([[new Date(2026,9,19),new Date(2026,10,2)],[new Date(2026,10,2),new Date(2026,10,16)],[new Date(2026,10,16),new Date(2026,11,1)],[new Date(2026,11,1),new Date(2026,11,14)]])}
  ]}
];
let updates=[
  {id:newId(),status:'green',text:'CTB build on schedule — all critical components received, assembly starts Monday'},
  {id:newId(),status:'yellow',text:'EVT build slipped 1 week — connector tooling delayed at supplier'},
  {id:newId(),status:'red',text:'DVT yield below target (62%) — root cause analysis in progress with ME/EE'},
];

/* ═══ DATE HELPERS ═══ */
function getToday(){if(simulatedToday)return new Date(simulatedToday);const d=new Date();d.setHours(0,0,0,0);return d;}
function getWeeks(){const w=[];let d=new Date(viewStart);while(d<=viewEnd){w.push(new Date(d));d.setDate(d.getDate()+7);}return w;}
function getMonthGroups(weeks){
  const g=[];let cur=null;
  weeks.forEach((w,i)=>{
    const k=w.getFullYear()+'-'+w.getMonth();
    if(!cur||cur.key!==k){cur={key:k,label:w.toLocaleString('en',{month:'short'}),weeks:[]};g.push(cur);}
    cur.weeks.push({date:w,wn:getWeekOfMonth(w),idx:i});
  });
  return g;
}
function getWeekOfMonth(d){const m1=new Date(d.getFullYear(),d.getMonth(),1);return Math.ceil(((d-m1)/86400000+m1.getDay()+1)/7);}
function dateToWeekIdx(date,weeks){
  let best=0,bestD=Infinity;
  weeks.forEach((w,i)=>{const d=Math.abs(w-date);if(d<bestD){bestD=d;best=i;}});
  return best;
}
/* Fractional position (in week-units) of `date` along the weeks axis.
   Unlike dateToWeekIdx (nearest-week, used for snapping UI), this gives
   a continuous value so pixel placement lines up exactly with the
   today/NOW line, which is also computed fractionally. */
function dateToWeekPos(date,weeks){
  if(date<=weeks[0])return 0;
  if(date>=weeks[weeks.length-1])return weeks.length-1;
  for(let i=0;i<weeks.length-1;i++){
    if(date>=weeks[i]&&date<weeks[i+1]){
      return i+((date-weeks[i])/(weeks[i+1]-weeks[i]));
    }
  }
  return weeks.length-1;
}
/* Inverse of dateToWeekPos — turns a fractional week-position back into a
   Date, used while dragging the Today line to find what date the cursor
   is currently over. */
function weekPosToDate(pos,weeks){
  const last=weeks.length-1;
  if(pos<=0)return new Date(weeks[0]);
  if(pos>=last)return new Date(weeks[last]);
  const i=Math.floor(pos),frac=pos-i;
  return new Date(weeks[i].getTime()+frac*(weeks[i+1]-weeks[i]));
}
/* Measures how wide a build/project-name tag would render (capped to the
   .gantt-build-tag max-width), so we can tell whether it would get clipped
   off the left edge of the visible viewport. */
function measureTagWidth(text){
  const ctx=measureTagWidth._ctx||(measureTagWidth._ctx=document.createElement('canvas').getContext('2d'));
  ctx.font='700 10px "Segoe UI","PingFang TC",sans-serif';
  return Math.min(ctx.measureText(text).width,90);
}
/* Given a candidate scrollLeft, nudge it left a little if doing so is
   needed to reveal a build/project-name tag that would otherwise get
   clipped right at the visible edge — keeps the "leftmost" bar's label
   from being hidden, e.g. in the default view. */
function avoidLeftEdgeTagClip(candidate){
  if(!showBuildName)return candidate;
  const weeks=getWeeks();
  let min=candidate;
  const WINDOW=140; // only consider bars landing just past the candidate edge
  function check(start,text){
    const left=dateToWeekPos(start,weeks)*WEEK_W;
    if(left>=candidate&&left<=candidate+WINDOW){
      const need=left-measureTagWidth(text)-6-8;
      if(need<min)min=need;
    }
  }
  projects.forEach(proj=>{
    let first=true;
    proj.subgroups.forEach(sg=>{
      if(!sg.bars.length)return;
      if(first){check(new Date(Math.min(...sg.bars.map(b=>b.start))),proj.name);first=false;}
      const earliest=sg.bars.reduce((a,b)=>a.start<b.start?a:b);
      check(earliest.start,sg.name);
    });
  });
  return Math.max(0,min);
}
function fmtDate(d){if(!d)return '';return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
/* Scroll the gantt area so that Jan 1 of `y` is at the left edge */
function scrollToYear(y){
  const weeks=getWeeks();
  const jan1=new Date(y,0,1);
  const idx=dateToWeekIdx(jan1,weeks);
  const scrollArea=document.getElementById('gantt-scroll-area');
  scrollArea.scrollLeft=avoidLeftEdgeTagClip(Math.max(0,idx*WEEK_W-4));
  viewYear=y;
  document.getElementById('nav-label').textContent=y;
}
/* Scroll the gantt area so today's date is centered in view */
function scrollToToday(){
  const weeks=getWeeks();
  const today=getToday();
  const idx=dateToWeekIdx(today,weeks);
  const scrollArea=document.getElementById('gantt-scroll-area');
  const visibleW=scrollArea.clientWidth-getLabelW();
  scrollArea.scrollLeft=avoidLeftEdgeTagClip(Math.max(0,idx*WEEK_W-visibleW/2));
  viewYear=today.getFullYear();
  document.getElementById('nav-label').textContent=viewYear;
}
/* Update the year label shown in the nav based on what's currently scrolled into view */
function updateYearLabelFromScroll(){
  const scrollArea=document.getElementById('gantt-scroll-area');
  const weeks=getWeeks();
  const visibleLeftPx=scrollArea.scrollLeft;
  const idx=Math.round(visibleLeftPx/WEEK_W);
  const w=weeks[Math.max(0,Math.min(weeks.length-1,idx))];
  if(w){
    viewYear=w.getFullYear();
    document.getElementById('nav-label').textContent=viewYear;
  }
}
function getNowOffset(weeks){
  const now=getToday();
  for(let i=0;i<weeks.length-1;i++){if(now>=weeks[i]&&now<weeks[i+1])return(i+((now-weeks[i])/(weeks[i+1]-weeks[i])))*WEEK_W;}
  return -1;
}
function autoProgress(bar){
  const now=getToday(),s=bar.start.getTime(),e=bar.end.getTime(),n=now.getTime();
  if(n<=s)return 0;if(n>=e)return 100;return Math.round(((n-s)/(e-s))*100);
}

/* ═══ GANTT RENDER ═══ */
function renderGantt(){
  markDirty();
  const weeks=getWeeks();
  const mGroups=getMonthGroups(weeks);
  const totalW=weeks.length*WEEK_W;
  const todayIdx=dateToWeekIdx(getToday(),weeks);

  /* — Fixed header (month + weeks) — */
  const hdrInner=document.getElementById('gantt-chart-hdr-inner');
  hdrInner.innerHTML='';
  hdrInner.style.width=totalW+'px';
  const mRow=document.createElement('div');mRow.className='gantt-hdr-months';
  mGroups.forEach(mg=>{
    const el=document.createElement('div');el.className='month-group';el.style.width=(mg.weeks.length*WEEK_W)+'px';
    const ml=document.createElement('div');ml.className='month-label';ml.style.width='100%';ml.textContent=mg.label;el.appendChild(ml);
    const wl=document.createElement('div');wl.className='week-labels';
    mg.weeks.forEach(w=>{
      const wc=document.createElement('div');wc.className='week-cell'+(w.idx===todayIdx?' today-wk':'');
      wc.style.width=WEEK_W+'px';wc.textContent=w.wn;wl.appendChild(wc);
    });
    el.appendChild(wl);mRow.appendChild(el);
  });
  hdrInner.appendChild(mRow);

  /* — Rows — */
  const rowsEl=document.getElementById('gantt-rows');
  rowsEl.innerHTML='';
  // chart area total width drives gantt-rows width so horizontal scroll works
  rowsEl.style.minWidth=(getLabelW()+totalW)+'px';

  projects.forEach((proj,pi)=>{
    rowsEl.appendChild(buildProjRow(proj,pi,weeks,totalW));
    proj.subgroups.forEach((sg,si)=>{
      const row=buildSubRow(sg,proj,pi,si,weeks,totalW);
      if(proj.collapsed)row.classList.add('collapsed-hidden');
      rowsEl.appendChild(row);
    });
  });

  /* Add Project row */
  const addRow=document.createElement('div');addRow.className='g-row add-row';
  const addLbl=document.createElement('div');addLbl.className='g-lbl';
  const addBtn=document.createElement('button');addBtn.className='add-proj-btn';
  addBtn.innerHTML=`<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Project`;
  addBtn.addEventListener('click',addProject);
  addLbl.appendChild(addBtn);
  const addChart=document.createElement('div');addChart.className='g-chart';
  addChart.style.width=totalW+'px';
  addRow.append(addLbl,addChart);rowsEl.appendChild(addRow);

  /* NOW line — rendered into gantt-rows as a draggable positioned overlay */
  // Remove old now line if any
  const oldNow=rowsEl.querySelector('.now-line-hit');
  if(oldNow)oldNow.remove();
  const nowOff=getNowOffset(weeks);
  if(nowOff>=0&&showTodayLine){
    const hit=document.createElement('div');hit.className='now-line-hit';
    hit.style.left=(getLabelW()+nowOff)+'px';
    const visual=document.createElement('div');visual.className='now-line-visual';hit.appendChild(visual);
    rowsEl.style.position='relative';
    rowsEl.appendChild(hit);
    attachNowLineDrag(hit,weeks,totalW);
  }

  /* Mirror header scroll when scroll-area scrolls horizontally */
  const scrollArea=document.getElementById('gantt-scroll-area');
  const hdrChart=document.getElementById('gantt-fixed-hdr-chart');
  scrollArea.onscroll=()=>{hdrChart.scrollLeft=scrollArea.scrollLeft;updateYearLabelFromScroll();};
}

function getLabelW(){
  if(window.lblCollapsed)return 0;
  return (typeof window.LW_EXPANDED==='number'?window.LW_EXPANDED:150);
}

/* ── Project row ── */
function buildProjRow(proj,pi,weeks,totalW){
  const row=document.createElement('div');row.className='g-row proj-row';

  const lbl=document.createElement('div');lbl.className='g-lbl';
  const colBtn=makeCollapse(proj.collapsed);
  colBtn.addEventListener('click',e=>{e.stopPropagation();proj.collapsed=!proj.collapsed;renderGantt();});
  const editBtn=makeRowAct(pencilSvg(),'Edit Project');
  editBtn.addEventListener('click',e=>{e.stopPropagation();openProjectEditor(proj,pi);});
  const delBtn=makeRowAct(trashSvg(),'Delete','del');
  delBtn.addEventListener('click',e=>{e.stopPropagation();confirmDelete('Delete project "'+proj.name+'"?',()=>{projects.splice(pi,1);renderGantt();});});

  const chart=document.createElement('div');chart.className='g-chart';chart.style.width=totalW+'px';
  const layer=document.createElement('div');layer.className='gantt-bars-layer';
  let firstProjBar=true,firstBuildTagEl=null;
  const insideLabelFor=sg=>showItemName?sg.name:null;
  proj.subgroups.forEach((sg)=>{
    if(!sg.bars.length)return;
    const minS=new Date(Math.min(...sg.bars.map(b=>b.start)));
    const maxE=new Date(Math.max(...sg.bars.map(b=>b.end)));
    const bar={id:sg.id,label:'',start:minS,end:maxE};
    const barColor=sg.color||proj.color;
    // Build Name outside tag: proj.name shown only once (leftmost bar) when toggle ON
    const outsideTag=showBuildName&&firstProjBar?proj.name:null;
    const el=buildBarEl(bar,barColor,weeks,totalW,()=>openRowEditor(sg,pi,proj.subgroups.indexOf(sg)),outsideTag,{baseLabel:insideLabelFor(sg)});
    el.style.height='calc(100% - 14px)';el.style.top='7px';
    if(firstProjBar){firstBuildTagEl=el.querySelector('.gantt-build-tag');firstProjBar=false;}
    layer.appendChild(el);
  });
  // Live-sync: typing the project name updates the visible build-tag on
  // the bar immediately, without a full renderGantt (which would yank
  // focus out of this contentEditable mid-keystroke).
  const name=makeRowName(proj.name,v=>proj.name=v,v=>{if(firstBuildTagEl)firstBuildTagEl.textContent=v;});
  lbl.append(colBtn,name,editBtn,delBtn);
  chart.appendChild(layer);
  row.append(lbl,chart);
  return row;
}

/* ── Sub-group row ── */
function buildSubRow(sg,proj,pi,si,weeks,totalW){
  const row=document.createElement('div');row.className='g-row sub-row';

  const lbl=document.createElement('div');lbl.className='g-lbl';

  const chart=document.createElement('div');chart.className='g-chart';chart.style.width=totalW+'px';
  const layer=document.createElement('div');layer.className='gantt-bars-layer';
  const barColor=sg.color||proj.color;
  let firstSubBar=true,firstBuildTagEl=null;
  sg.bars.forEach(bar=>{
    const outsideTag=showBuildName&&firstSubBar?sg.name:null;
    const insideLabel=showItemName?bar.label:null;
    const el=buildBarEl(bar,barColor,weeks,totalW,()=>openRowEditor(sg,pi,si),outsideTag,{baseLabel:insideLabel});
    if(firstSubBar){firstBuildTagEl=el.querySelector('.gantt-build-tag');firstSubBar=false;}
    layer.appendChild(el);
  });
  // Live-sync: typing the build name updates the visible build-tag on the
  // bar immediately, without a full renderGantt (which would yank focus
  // out of this contentEditable mid-keystroke).
  const name=makeRowName(sg.name,v=>sg.name=v,v=>{if(firstBuildTagEl)firstBuildTagEl.textContent=v;});
  name.style.paddingLeft='4px';
  lbl.append(name);
  chart.appendChild(layer);
  row.append(lbl,chart);
  return row;
}

/* ── Build bar element ──
   `baseLabel` is the label that's ALWAYS shown on this bar by default
   (Build name "P0" for project-row mini-bars, Item name "PDFC" for
   sub-group/build-row bars). `buildName` is only used to optionally
   prefix sub-group rows with their parent Build name when the
   "Build Name" toggle is on (it has no effect on project rows, which
   already show the build name as their base label).
   The Build Name, when shown, renders as a separate tag BEFORE/OUTSIDE
   the bar pill — never overlapping the bar itself. */
function buildBarEl(bar,color,weeks,totalW,onClick,buildName,opts){
  opts=opts||{};
  const sPos=dateToWeekPos(bar.start,weeks);
  const ePos=dateToWeekPos(bar.end,weeks);
  const left=sPos*WEEK_W, width=Math.max((ePos-sPos)*WEEK_W,6);
  const prog=autoProgress(bar);

  const wrap=document.createElement('div');wrap.className='gantt-bar-wrap';wrap.style.cssText=`left:${left}px;width:${width}px`;
  wrap.dataset.start=bar.start.getTime();wrap.dataset.end=bar.end.getTime();

  // Outside tag (before/left of bar) — only rendered when buildName is non-null
  if(buildName){
    const tag=document.createElement('div');tag.className='gantt-build-tag';tag.textContent=buildName;
    tag.style.color=color;
    wrap.appendChild(tag);
  }

  const outer=document.createElement('div');outer.className='gantt-bar-outer';
  const track=document.createElement('div');track.className='gantt-bar-track';track.style.background=color;
  const fill=document.createElement('div');fill.className='gantt-bar-fill';fill.style.cssText=`width:${showProgress?prog:100}%;background:${color}`;
  const lbl=document.createElement('div');lbl.className='gantt-bar-label';
  if(opts.baseLabel)lbl.textContent=opts.baseLabel;
  outer.append(track,fill,lbl);
  if(onClick)outer.addEventListener('click',onClick);
  wrap.appendChild(outer);return wrap;
}

/* ── Draggable Today/NOW line ──
   Lets the user grab the vertical "today" line and slide it left/right to
   preview a different date. While dragging, every bar's progress fill and
   a small "NN%" badge update live (no full re-render, so it stays smooth);
   on release the change is committed via a normal renderGantt(). */
function attachNowLineDrag(hit,weeks,totalW){
  const rowsEl=document.getElementById('gantt-rows');
  let dragging=false,cache=null,floatTip=null,tipTop=0;
  function buildCache(){
    cache=[...rowsEl.querySelectorAll('.gantt-bar-wrap')].map(w=>({
      s:+w.dataset.start,e:+w.dataset.end,
      fill:w.querySelector('.gantt-bar-fill'),
      width:parseFloat(w.style.width)||0,
      el:w
    }));
  }
  function liveUpdate(t){
    if(!cache)return;
    cache.forEach(c=>{
      let prog=0;
      if(t<=c.s)prog=0;else if(t>=c.e)prog=100;else prog=Math.round(((t-c.s)/(c.e-c.s))*100);
      if(showProgress&&c.fill)c.fill.style.width=prog+'%';
      let badge=c.el.querySelector('.now-line-bar-badge');
      if(t>c.s&&t<c.e){
        if(!badge){badge=document.createElement('div');badge.className='now-line-bar-badge';c.el.appendChild(badge);}
        badge.textContent=prog+'%';
        badge.style.left=(((t-c.s)/(c.e-c.s))*c.width)+'px';
      }else if(badge){badge.remove();}
    });
  }
  function moveTo(clientX){
    const rect=rowsEl.getBoundingClientRect();
    let x=clientX-rect.left-getLabelW();
    x=Math.max(0,Math.min(x,totalW));
    const d=weekPosToDate(x/WEEK_W,weeks);
    d.setHours(0,0,0,0);
    simulatedToday=d;
    hit.style.left=(getLabelW()+x)+'px';
    todayDateInput.value=fmtDate(d);
    if(floatTip){
      floatTip.textContent=fmtDate(d);
      floatTip.style.left=clientX+'px';
      floatTip.style.top=tipTop+'px';
    }
    liveUpdate(d.getTime());
  }
  function endDrag(){
    if(!dragging)return;
    dragging=false;hit.classList.remove('dragging');cache=null;
    if(floatTip){floatTip.remove();floatTip=null;}
    renderGantt(); // commit cleanly: re-syncs header highlight, scroll mirror, etc.
  }
  hit.addEventListener('pointerdown',e=>{
    e.preventDefault();e.stopPropagation();
    dragging=true;hit.classList.add('dragging');
    try{hit.setPointerCapture(e.pointerId);}catch(err){}
    // Pin the tooltip just below the fixed header (not at the cursor) so it
    // never overlaps the per-row percentage badges while dragging.
    tipTop=document.getElementById('gantt-fixed-hdr').getBoundingClientRect().bottom+8;
    floatTip=document.createElement('div');floatTip.className='now-line-floating-tip';
    document.body.appendChild(floatTip);
    buildCache();moveTo(e.clientX);
  });
  hit.addEventListener('pointermove',e=>{if(dragging){e.preventDefault();moveTo(e.clientX);}});
  hit.addEventListener('pointerup',endDrag);
  hit.addEventListener('pointercancel',endDrag);
}

/* ── Small helpers ── */
function makeRowName(val,onBlur,onInput){
  const s=document.createElement('span');s.className='row-name';s.contentEditable='true';s.textContent=val;
  // Live-sync while typing: update the bar's label text directly (no
  // renderGantt — a full re-render would destroy this contentEditable
  // node mid-keystroke and break the caret/IME composition).
  if(onInput)s.addEventListener('input',()=>onInput(s.textContent));
  s.addEventListener('blur',()=>{onBlur(s.textContent);renderGantt();});
  s.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();s.blur();}});
  return s;
}
function makeRowAct(svg,title,cls=''){
  const b=document.createElement('button');b.className='row-act'+(cls?' '+cls:'');b.title=title;b.innerHTML=svg;return b;
}
function makeCollapse(closed){
  const b=document.createElement('button');b.className='collapse-btn'+(closed?' closed':'');
  b.innerHTML=`<svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>`;return b;
}
function pencilSvg(){return`<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;}
function trashSvg(){return`<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1.2 14.1a2 2 0 0 1-2 1.9H8.2a2 2 0 0 1-2-1.9L5 6"/><path d="M10 11v6M14 11v6M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;}

/* ═══ PROJECT EDITOR POPUP — edits project name/color + all its builds & their items ═══ */

  const delProjBtn=document.createElement('button');delProjBtn.className='rep-icon-btn rep-del';delProjBtn.title='Delete Project';
  delProjBtn.innerHTML=trashSvg();
  delProjBtn.addEventListener('click',e=>{e.stopPropagation();confirmDelete('Delete project "'+proj.name+'"?',()=>{projects.splice(pi,1);closeRowEditor();renderGantt();});});
  const hActs=document.createElement('div');hActs.className='rep-header-actions';hActs.append(delProjBtn,applyBtn);

      /* Build header row: color dot + name + delete */
      const bHdr=document.createElement('div');bHdr.style.cssText='display:flex;align-items:center;gap:6px';
      const bColorDot=document.createElement('div');bColorDot.className='rep-title-color-dot';bColorDot.style.cssText=`background:${sg.color};width:12px;height:12px;cursor:pointer`;bColorDot.title='Change build color';

/* ═══ DATE RANGE CALENDAR PICKER ═══
   Single calendar: first click sets start, second click sets end
   (auto-swaps if end < start). Used for Item date ranges. Click outside
   or Done to close. */
let drpState=null;
function openDateRangePicker(anchorEl,bar,onChange){
  const existing=document.getElementById('date-range-picker');
  if(existing)existing.remove();

  const pop=document.createElement('div');pop.id='date-range-picker';pop.className='drp-popup';
  drpState={
    bar,onChange,
    pendingStart:new Date(bar.start),
    pendingEnd:new Date(bar.end),
    viewMonth:new Date(bar.start.getFullYear(),bar.start.getMonth(),1),
    clickStage:'start'
  };

  renderDRP(pop);
  document.body.appendChild(pop);

  const popW=pop.offsetWidth,popH=pop.offsetHeight;
  const rect=anchorEl.getBoundingClientRect();
  let top=rect.bottom+6,left=rect.left;
  if(left+popW>window.innerWidth-8)left=window.innerWidth-popW-8;
  if(left<8)left=8;
  if(top+popH>window.innerHeight-8)top=rect.top-popH-6;
  if(top<8)top=8;
  pop.style.top=top+'px';pop.style.left=left+'px';

  setTimeout(()=>{document.addEventListener('mousedown',drpOutsideClick);},0);
}
function drpOutsideClick(e){
  const pop=document.getElementById('date-range-picker');
  if(pop&&!pop.contains(e.target)){
    document.removeEventListener('mousedown',drpOutsideClick);
    pop.remove();
  }
}
function renderDRP(pop){
  pop.innerHTML='';
  const st=drpState;

  const hdr=document.createElement('div');hdr.className='drp-hdr';
  const prevBtn=document.createElement('button');prevBtn.className='drp-nav-btn';prevBtn.textContent='‹';
  prevBtn.addEventListener('click',e=>{e.stopPropagation();st.viewMonth=new Date(st.viewMonth.getFullYear(),st.viewMonth.getMonth()-1,1);renderDRP(pop);});
  const mLbl=document.createElement('div');mLbl.className='drp-month-lbl';
  mLbl.textContent=st.viewMonth.toLocaleString('en',{month:'long'})+' '+st.viewMonth.getFullYear();
  const nextBtn=document.createElement('button');nextBtn.className='drp-nav-btn';nextBtn.textContent='›';
  nextBtn.addEventListener('click',e=>{e.stopPropagation();st.viewMonth=new Date(st.viewMonth.getFullYear(),st.viewMonth.getMonth()+1,1);renderDRP(pop);});
  hdr.append(prevBtn,mLbl,nextBtn);pop.appendChild(hdr);

  const rangeDisp=document.createElement('div');rangeDisp.className='drp-range-display';
  rangeDisp.textContent=fmtDate(st.pendingStart)+'  →  '+fmtDate(st.pendingEnd);
  pop.appendChild(rangeDisp);

  const dow=document.createElement('div');dow.className='drp-dow-row';
  ['S','M','T','W','T','F','S'].forEach(d=>{const c=document.createElement('div');c.className='drp-dow';c.textContent=d;dow.appendChild(c);});
  pop.appendChild(dow);

  const grid=document.createElement('div');grid.className='drp-grid';
  const first=new Date(st.viewMonth.getFullYear(),st.viewMonth.getMonth(),1);
  const startOffset=first.getDay();
  const daysInMonth=new Date(st.viewMonth.getFullYear(),st.viewMonth.getMonth()+1,0).getDate();
  for(let i=0;i<startOffset;i++){grid.appendChild(document.createElement('div'));}
  for(let d=1;d<=daysInMonth;d++){
    const cellDate=new Date(st.viewMonth.getFullYear(),st.viewMonth.getMonth(),d);
    const cell=document.createElement('button');cell.className='drp-day';cell.textContent=d;
    const inRange=cellDate>=normalizeDay(st.pendingStart)&&cellDate<=normalizeDay(st.pendingEnd);
    const isStart=sameDay(cellDate,st.pendingStart),isEnd=sameDay(cellDate,st.pendingEnd);
    if(inRange)cell.classList.add('in-range');
    if(isStart)cell.classList.add('range-start');
    if(isEnd)cell.classList.add('range-end');
    if(sameDay(cellDate,getToday()))cell.classList.add('is-today');
    cell.addEventListener('click',e=>{
      e.stopPropagation();
      if(st.clickStage==='start'){
        st.pendingStart=cellDate;st.pendingEnd=cellDate;st.clickStage='end';
      }else{
        if(cellDate<st.pendingStart){st.pendingEnd=st.pendingStart;st.pendingStart=cellDate;}
        else{st.pendingEnd=cellDate;}
        st.clickStage='start';
      }
      renderDRP(pop);
    });
    grid.appendChild(cell);
  }
  pop.appendChild(grid);

  const actions=document.createElement('div');actions.className='drp-actions';
  const doneBtn=document.createElement('button');doneBtn.className='drp-done-btn';doneBtn.textContent='Done';
  doneBtn.addEventListener('click',e=>{
    e.stopPropagation();
    st.bar.start=st.pendingStart;st.bar.end=st.pendingEnd;
    pop.remove();
    document.removeEventListener('mousedown',drpOutsideClick);
    st.onChange();
  });
  actions.appendChild(doneBtn);pop.appendChild(actions);
}
function normalizeDay(d){const r=new Date(d);r.setHours(0,0,0,0);return r;}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}

/* ═══ INLINE COLOR WHEEL ═══ */
function buildWheelPanel(owner,colorCircle,panel){
  panel.innerHTML='';
  let {h,s,l}=hexToHSL(owner.color||DEFAULT_COLOR);let curColor=owner.color||DEFAULT_COLOR;
  const cwWrap=document.createElement('div');cwWrap.className='cwp-canvas-wrap';
  const canvas=document.createElement('canvas');canvas.width=130;canvas.height=130;canvas.style.cssText='border-radius:50%;cursor:crosshair;display:block';
  cwWrap.appendChild(canvas);panel.appendChild(cwWrap);
  const hexRow=document.createElement('div');hexRow.className='cwp-preview-row';
  const hexPrev=document.createElement('div');hexPrev.className='cwp-preview';hexPrev.style.background=curColor;
  const hexInput=document.createElement('input');hexInput.className='cwp-hex-input';hexInput.value=curColor;hexInput.maxLength=7;
  hexInput.addEventListener('input',()=>{if(/^#[0-9a-fA-F]{6}$/.test(hexInput.value)){curColor=hexInput.value;const r=hexToHSL(curColor);h=r.h;s=r.s;l=r.l;commit(false);}});
  hexRow.append(hexPrev,hexInput);panel.appendChild(hexRow);
  function draw(){
    const ctx=canvas.getContext('2d'),cx=65,cy=65,r=58;ctx.clearRect(0,0,130,130);
    for(let a=0;a<360;a++){ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,(a-1)*Math.PI/180,(a+1)*Math.PI/180);ctx.closePath();ctx.fillStyle=`hsl(${a},${s}%,${l}%)`;ctx.fill();}
    const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,r);grd.addColorStop(0,'rgba(255,255,255,1)');grd.addColorStop(.5,'rgba(255,255,255,0)');
    ctx.fillStyle=grd;ctx.beginPath();ctx.arc(cx,cy,r,0,2*Math.PI);ctx.fill();
    const a=(h-90)*Math.PI/180,ir=r*0.72,ix=cx+ir*Math.cos(a),iy=cy+ir*Math.sin(a);
    ctx.beginPath();ctx.arc(ix,iy,5,0,2*Math.PI);ctx.strokeStyle='#fff';ctx.lineWidth=2.2;ctx.stroke();ctx.fillStyle=curColor;ctx.fill();
  }
  canvas.onclick=function(ev){const rect=canvas.getBoundingClientRect(),mx=ev.clientX-rect.left-65,my=ev.clientY-rect.top-65;h=(Math.round(Math.atan2(my,mx)*180/Math.PI+90+360)%360);curColor=hslToHex(h,s,l);commit();};
  function commit(upHex=true){owner.color=curColor;colorCircle.style.background=curColor;hexPrev.style.background=curColor;if(upHex)hexInput.value=curColor;draw();renderGantt();}
  draw();
}
function hexToHSL(hex){
  let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;let h=0,sv=0,l=(max+min)/2;
  if(d){sv=d/(1-Math.abs(2*l-1));switch(max){case r:h=((g-b)/d+6)%6;break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break;}h=Math.round(h*60);}
  return{h:Math.round(h),s:Math.round(sv*100),l:Math.round(l*100)};
}
function hslToHex(h,s,l){
  s/=100;l/=100;const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12,c=l-a*Math.max(-1,Math.min(k-3,9-k,1));return Math.round(255*c).toString(16).padStart(2,'0');};
  return'#'+f(0)+f(8)+f(4);
}

document.getElementById('export-btn').addEventListener('click',()=>{
  /* Build the export from a CLEANED CLONE of the live document, not a
     raw outerHTML snapshot — that would freeze whatever UI state happens
     to be open right now, including the sidebar itself (since that's
     literally where this button lives). Clone, force-close every
     overlay/popup in the clone only (the live page you're looking at is
     untouched), inject the CURRENT data as real JS literals into the
     clone's <script> text (Date objects become `new Date(...)` calls,
     not strings), then download that. This is the ONLY place your data
     gets written to a file — nothing is auto-saved to the browser, so a
     plain refresh always goes back to this default sample data unless
     you Export. */
  const clone=document.documentElement.cloneNode(true);
  const closeSel=id=>{const el=clone.querySelector('#'+id);if(el)el.classList.remove('open','show');};
  closeSel('sidebar');closeSel('sidebar-overlay');closeSel('rep-overlay');closeSel('confirm-overlay');
  const hideSel=id=>{const el=clone.querySelector('#'+id);if(el)el.style.display='none';};
  hideSel('row-editor-popup');hideSel('gantt-settings-panel');
  clone.querySelectorAll('#date-range-picker').forEach(el=>el.remove());

  const scriptEl=clone.querySelector('script');
  let js=scriptEl.textContent;
  js=js.replace(/let projects=\[[\s\S]*?\n\];/,'let projects='+jsLiteral(projects)+';');
  js=js.replace(/let updates=\[[\s\S]*?\n\];/,'let updates='+jsLiteral(updates)+';');
  scriptEl.textContent=js;

  downloadHtml('<!DOCTYPE html>\n'+clone.outerHTML);
  _dirty=false; // data is now saved — no need to warn on close
});
/* Like JSON.stringify, but Date instances become `new Date(...)` source
   text instead of quoted ISO strings, so the result is valid executable
   JS (not just JSON data) that reconstructs real Date objects when the
   exported file is opened. */
/* ═══ LOCAL TEMP STORAGE (browser-only, manual save/load/reset) ═══
   Nothing here runs automatically. Data is only written to localStorage
   when the user clicks "本機暫存", and only read back when the user clicks
   "讀取暫存" — refreshing does NOT auto-restore it (that's still Export's
   job, per the note above about why localStorage auto-save was removed). */
const LOCAL_TEMP_KEY='projectDashboard_local_temp_v2';
function dateReplacer(key,value){
  const v=this[key];
  if(v instanceof Date) return {__isDate:true,t:v.getTime()};
  return value;
}
function dateReviver(key,value){
  if(value&&typeof value==='object'&&value.__isDate) return new Date(value.t);
  return value;
}
function localTempStatusText(){
  try{
    const raw=localStorage.getItem(LOCAL_TEMP_KEY);
    if(!raw) return '目前沒有本機暫存資料。';
    const snap=JSON.parse(raw);
    return snap.savedAt?('上次本機暫存時間：'+new Date(snap.savedAt).toLocaleString()):'已有本機暫存資料。';
  }catch(e){ return '目前沒有本機暫存資料。'; }
}
function refreshLocalTempStatus(){
  const el=document.getElementById('local-temp-status');
  if(el) el.textContent=localTempStatusText();
}
document.getElementById('save-local-btn').addEventListener('click',()=>{
  try{
    const snapshot={projects,updates,pageTitle:document.getElementById('page-title').textContent,savedAt:new Date().toISOString()};
    localStorage.setItem(LOCAL_TEMP_KEY,JSON.stringify(snapshot,dateReplacer));
    _dirty=false;
    refreshLocalTempStatus();
    alert('已存入本機暫存');
  }catch(err){ console.error(err); alert('本機暫存失敗'); }
});
document.getElementById('load-local-btn').addEventListener('click',()=>{
  const raw=localStorage.getItem(LOCAL_TEMP_KEY);
  if(!raw){ alert('尚未有本機暫存資料'); return; }
  if(!confirm('讀取本機暫存將覆蓋目前畫面上尚未儲存的內容，確定要讀取嗎？')) return;
  try{
    const snap=JSON.parse(raw,dateReviver);
    if(Array.isArray(snap.projects)) projects=snap.projects;
    if(Array.isArray(snap.updates)) updates=snap.updates;
    if(snap.pageTitle) document.getElementById('page-title').textContent=snap.pageTitle;
    applyZoom();
    renderGantt();
    renderUpdates();
    _dirty=false;
    closeSidebar();
    alert('已讀取本機暫存（'+(snap.savedAt?new Date(snap.savedAt).toLocaleString():'')+'）');
  }catch(err){ console.error(err); alert('讀取失敗，暫存資料可能已損毀'); }
});
document.getElementById('reset-local-btn').addEventListener('click',()=>{

  if(!confirm('確定要清除本機暫存資料嗎？此動作無法復原（目前畫面上的內容不受影響）。')) return;

function jsLiteral(val){
  if(val instanceof Date)return 'new Date('+val.getTime()+')';
  if(Array.isArray(val))return '['+val.map(jsLiteral).join(',')+']';
  if(val&&typeof val==='object'){
    return '{'+Object.keys(val).map(k=>JSON.stringify(k)+':'+jsLiteral(val[k])).join(',')+'}';
  }
  return JSON.stringify(val);
}
function downloadHtml(htmlStr){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([htmlStr],{type:'text/html'}));
  a.download='project-dashboard.html';a.click();URL.revokeObjectURL(a.href);
}
const todayDateInput=document.getElementById('today-date-input');
function refreshTodayInput(){todayDateInput.value=fmtDate(getToday());}
refreshTodayInput();
/* Plain text input — no native browser date picker. Accepts YYYY-MM-DD
   typed manually; validates before committing, otherwise reverts to the
   last valid value so the field never holds garbage. */
function commitTodayInput(){
  const v=todayDateInput.value.trim();
  if(!v){simulatedToday=null;refreshTodayInput();renderGantt();return;}
  const m=v.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!m){refreshTodayInput();return;} // invalid format — revert, don't touch state
  const y=+m[1],mo=+m[2],d=+m[3];
  const parsed=new Date(y,mo-1,d);
  if(parsed.getFullYear()!==y||parsed.getMonth()!==mo-1||parsed.getDate()!==d){
    refreshTodayInput();return; // invalid calendar date (e.g. 2026-02-31) — revert
  }
  simulatedToday=parsed;
  refreshTodayInput();
  renderGantt(); // re-syncs: NOW-line position, every bar's progress fill, today-wk header highlight
}
todayDateInput.addEventListener('blur',commitTodayInput);
todayDateInput.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();todayDateInput.blur();}});

/* ═══ PROJECT TARGET — rich text toolbar ═══ */
(function(){
  const targetText=document.getElementById('target-text');
  const colorInput=document.getElementById('target-color-input');
  const colorSwatch=document.getElementById('target-color-swatch');

  document.querySelectorAll('.tgt-tool-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      targetText.focus();
      document.execCommand(btn.dataset.cmd,false,null);
      updateToolbarState();
    });
  });

  colorInput.addEventListener('input',()=>{
    colorSwatch.style.background=colorInput.value;
    targetText.focus();
    document.execCommand('foreColor',false,colorInput.value);
  });

  // Reflect bold/italic state of the current selection on the toolbar
  function updateToolbarState(){
    document.querySelectorAll('.tgt-tool-btn').forEach(btn=>{
      const isList=btn.dataset.cmd==='insertUnorderedList';
      const on=isList?document.queryCommandState('insertUnorderedList'):document.queryCommandState(btn.dataset.cmd);
      btn.classList.toggle('active',!!on);
    });
  }
  document.addEventListener('selectionchange',()=>{
    if(document.activeElement===targetText)updateToolbarState();
  });
})();

/* ═══ LABEL COLUMN FOLD ═══ */
const ganttWrapEl=document.getElementById('gantt-wrap');
const foldHandle=document.getElementById('gantt-fold-handle');
window.LW_EXPANDED=150;
window.lblCollapsed=false;
function setLblCollapsed(v){
  window.lblCollapsed=v;
  document.documentElement.style.setProperty('--lw',v?'0px':window.LW_EXPANDED+'px');
  ganttWrapEl.classList.toggle('lbl-collapsed',v);
  foldHandle.title=v?'Expand project list':'Collapse project list';
  // The today/NOW line's left offset is baked in as an inline px value at
  // render time (getLabelW() + week offset). It doesn't auto-follow --lw,
  // so without a re-render it stays stuck at the old offset and drifts out
  // of alignment with the bars whenever the label column folds/unfolds.
  renderGantt();
}
foldHandle.addEventListener('click',()=>setLblCollapsed(!window.lblCollapsed));
// On small screens, start collapsed so the timeline has more room by default
if(window.innerWidth<=640)setLblCollapsed(true);

renderGantt();
renderUpdates();
refreshLocalTempStatus();
_initialRender=false; // from now on, any change marks the page as unsaved
// Default view: show January of the base year, left-aligned, so the
// project list starts right at the beginning of the timeline.
scrollToYear(BASE_YEAR);
